[phases.setup]
nixPkgs = [
  "python311",
  "chromium",
  "nss",
  "nspr",
  "atk",
  "at-spi2-atk",
  "xorg.libX11",
  "xorg.libxcb",
  "xorg.libXcomposite",
  "xorg.libXcursor",
  "xorg.libXdamage",
  "xorg.libXext",
  "xorg.libXfixes",
  "xorg.libXi",
  "xorg.libXrandr",
  "xorg.libXrender",
  "xorg.libXtst",
  "xorg.libXScrnSaver",
  "glib",
  "gtk3",
  "pango",
  "cairo",
  "gdk-pixbuf",
  "cups",
  "dbus",
  "expat",
  "fontconfig",
  "freetype",
  "libdrm",
  "mesa",
  "alsa-lib",
  "libxshmfence",
  "pciutils",
  "libvpx",
  "ffmpeg",
  "libwebp",
  "libjpeg",
  "libpng",
  "opus",
  "libvorbis",
  "libavcodec",
  "libavformat",
  "libavutil",
  "libevent",
  "lz4",
  "snappy",
  "harfbuzz",
  "libexpat",
  "libxkbcommon"
]

[phases.install]
cmds = ["pip install -r requirements.txt"]

[phases.build]
cmds = ["python -m playwright install chromium"]

[start]
cmd = "uvicorn backend.main:app --host 0.0.0.0 --port $PORT"