name: DealerScope Source Quality Proof

on:
  workflow_dispatch:
    inputs:
      source:
        description: Source/source_site to inspect
        required: true
        default: proxibid
      limit:
        description: Recent-row sample size
        required: false
        default: "300"

permissions:
  contents: read

jobs:
  proof:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch sanitized source quality summary
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          SOURCE_NAME: ${{ inputs.source }}
          SAMPLE_LIMIT: ${{ inputs.limit }}
        run: |
          set -euo pipefail
          python3 <<'PY'
          import json
          import os
          import time
          import urllib.error
          import urllib.parse
          import urllib.request
          from datetime import datetime, timedelta, timezone

          SOURCE_ACTOR_IDS = {
              "proxibid": "bxhncvtHEP712WX2e",
              "govdeals": "CuKaIAcWyFS0EPrAz",
          }
          PROXIBID_ACTOR_ID = SOURCE_ACTOR_IDS["proxibid"]
          VIN_PASS_THRESHOLD_PCT = 5.0
          MILEAGE_PASS_THRESHOLD_PCT = 1.0

          supabase_url = os.environ["SUPABASE_URL"].rstrip("/")
          service_key = os.environ["SUPABASE_SERVICE_ROLE_KEY"]
          source = (os.environ.get("SOURCE_NAME") or "proxibid").strip().lower()
          try:
              limit = max(1, min(int(os.environ.get("SAMPLE_LIMIT") or "300"), 1000))
          except ValueError:
              limit = 300

          def json_get(url, headers=None, attempts=3):
              for attempt in range(attempts):
                  req = urllib.request.Request(url, headers=headers or {})
                  try:
                      with urllib.request.urlopen(req, timeout=30) as resp:
                          return json.loads(resp.read().decode())
                  except (TimeoutError, urllib.error.URLError):
                      if attempt == attempts - 1:
                          raise
                      time.sleep(2 * (attempt + 1))

          def rest_get(path):
              return json_get(
                  f"{supabase_url}{path}",
                  headers={"apikey": service_key, "Authorization": f"Bearer {service_key}"},
              )

          def apify_get(path, token):
              return json_get(
                  f"https://api.apify.com/v2{path}",
                  headers={"Authorization": f"Bearer {token}"},
              )

          columns_rows = rest_get("/rest/v1/opportunities?select=*&limit=1")
          available_columns = set(columns_rows[0].keys()) if columns_rows else set()
          wanted = [
              "id",
              "created_at",
              "source",
              "source_site",
              "mileage",
              "vin",
              "pricing_maturity",
              "mmr_confidence_proxy",
              "condition_grade",
              "condition",
              "dos_score",
              "score",
              "pricing_raw",
              "pricing_source",
              "raw_data",
              "provenance_fields",
              "source_run_id",
              "run_id",
              "listing_url",
              "detail_enriched",
          ]
          selected_columns = [col for col in wanted if col in available_columns]
          select = ",".join(selected_columns or ["id"])
          if "source_site" in available_columns:
              source_filter_key = "source_site"
          elif "source" in available_columns:
              source_filter_key = "source"
          else:
              raise SystemExit("opportunities has neither source nor source_site column")

          order_column = "created_at" if "created_at" in available_columns else selected_columns[0]
          base_query_args = {
              "select": select,
              source_filter_key: f"eq.{source}",
              "order": f"{order_column}.desc",
              "limit": str(limit),
          }
          proof_window_start = None
          if "created_at" in available_columns:
              proof_window_start = (datetime.now(timezone.utc) - timedelta(days=7)).isoformat().replace("+00:00", "Z")
              base_query_args["created_at"] = f"gte.{proof_window_start}"

          def has_mileage(row):
              try:
                  value = row.get("mileage")
                  return value not in (None, "") and float(value) > 0
              except (TypeError, ValueError):
                  return False

          def has_vin(row):
              value = str(row.get("vin") or "").strip().upper()
              return len(value) == 17 and value.isalnum() and not any(ch in value for ch in "IOQ")

          def has_condition(row):
              value = str(row.get("condition_grade") or row.get("condition") or "").strip().lower()
              return bool(value) and value not in {"unknown", "poor"}

          def has_confidence(row):
              return row.get("mmr_confidence_proxy") is not None

          def pct(count, total):
              return round((count / total) * 100, 1) if total else None

          def count_by(field, source_rows=None):
              out = {}
              for row in (source_rows if source_rows is not None else rows):
                  value = str(row.get(field) or "unknown")
                  out[value] = out.get(value, 0) + 1
              return dict(sorted(out.items()))

          def canonical_source_ok(row):
              return str(row.get(source_filter_key) or "").strip().lower() == source

          def field_present(row, *names):
              for name in names:
                  value = row.get(name)
                  if value not in (None, "", {}, []):
                      return True
              return False

          def pricing_raw_present(row):
              raw = row.get("raw_data") if isinstance(row.get("raw_data"), dict) else {}
              return field_present(row, "pricing_raw", "pricing_source", "pricing_maturity") or any(
                  raw.get(key) not in (None, "", {}, [])
                  for key in ("pricing_raw", "pricing_source", "market_comp", "estimated_sale_price")
              )

          def provenance_present(row):
              raw = row.get("raw_data") if isinstance(row.get("raw_data"), dict) else {}
              return field_present(row, "provenance_fields", "source_run_id", "run_id", "detail_enriched") or any(
                  raw.get(key) not in (None, "", {}, [])
                  for key in ("provenance_fields", "source_run_id", "run_id", "detail_enriched", "scraped_at", "listing_url")
              )

          def sanitize_sample(row):
              raw = row.get("raw_data") if isinstance(row.get("raw_data"), dict) else {}
              return {
                  "id": str(row.get("id") or "")[:8],
                  "created_at": row.get("created_at"),
                  "source_site": row.get("source_site"),
                  "vin_present": has_vin(row),
                  "mileage_present": has_mileage(row),
                  "pricing_maturity": row.get("pricing_maturity"),
                  "pricing_raw_present": pricing_raw_present(row),
                  "provenance_present": provenance_present(row),
                  "detail_enriched": bool(row.get("detail_enriched") or raw.get("detail_enriched")),
                  "listing_url_present": bool(row.get("listing_url") or raw.get("listing_url")),
              }

          def row_run_ids(row):
              raw = row.get("raw_data") if isinstance(row.get("raw_data"), dict) else {}
              values = []
              for key in ("source_run_id", "run_id", "actor_run_id", "apify_run_id"):
                  for container in (row, raw):
                      value = container.get(key) if isinstance(container, dict) else None
                      if value not in (None, "", {}, []):
                          values.append(str(value))
              return set(values)

          def rows_for_actor_run(actor_run_id):
              if not actor_run_id:
                  return []
              lineage_filters = []
              if "source_run_id" in available_columns:
                  lineage_filters.append(("source_run_id", f"eq.{actor_run_id}"))
              if "run_id" in available_columns:
                  lineage_filters.append(("run_id", f"eq.{actor_run_id}"))

              by_id = {}
              for key, value in lineage_filters:
                  query_args = dict(base_query_args)
                  query_args[key] = value
                  query = urllib.parse.urlencode(query_args)
                  for row in rest_get(f"/rest/v1/opportunities?{query}"):
                      by_id[row.get("id") or json.dumps(row, sort_keys=True)] = row

              if not by_id and "raw_data" in available_columns:
                  # Supabase REST cannot reliably OR across JSON/object top-level columns here, so
                  # fall back to the bounded source/time window and require raw row lineage locally.
                  query = urllib.parse.urlencode(base_query_args)
                  for row in rest_get(f"/rest/v1/opportunities?{query}"):
                      if actor_run_id in row_run_ids(row):
                          by_id[row.get("id") or json.dumps(row, sort_keys=True)] = row
              return list(by_id.values())

          def delivery_accounting_for_actor_run(actor_run_id):
              if not actor_run_id:
                  return {
                      "available": False,
                      "reason": "missing_actor_run_id",
                      "delivery_rows": 0,
                      "business_rejection_rows": 0,
                      "status_counts": {},
                      "reason_counts": {},
                  }
              query_args = {
                  "select": "run_id,status,error_message,created_at",
                  "run_id": f"eq.{actor_run_id}",
                  "order": "created_at.desc",
                  "limit": "1000",
              }
              try:
                  delivery_rows = rest_get(f"/rest/v1/ingest_delivery_log?{urllib.parse.urlencode(query_args)}")
              except Exception as exc:
                  return {
                      "available": False,
                      "reason": f"delivery_log_unavailable:{type(exc).__name__}",
                      "delivery_rows": 0,
                      "business_rejection_rows": 0,
                      "status_counts": {},
                      "reason_counts": {},
                  }

              status_counts = {}
              reason_counts = {}
              business_rejection_statuses = {"skipped_margin", "skipped_ceiling"}
              business_rejection_rows = 0
              for row in delivery_rows:
                  status = str(row.get("status") or "unknown").strip()
                  reason = str(row.get("error_message") or "none").strip() or "none"
                  status_counts[status] = status_counts.get(status, 0) + 1
                  reason_counts[reason] = reason_counts.get(reason, 0) + 1
                  if status in business_rejection_statuses:
                      business_rejection_rows += 1

              return {
                  "available": True,
                  "actor_run_id": actor_run_id,
                  "delivery_rows": len(delivery_rows),
                  "business_rejection_rows": business_rejection_rows,
                  "status_counts": dict(sorted(status_counts.items())),
                  "reason_counts": dict(sorted(reason_counts.items())),
              }

          query = urllib.parse.urlencode(base_query_args)
          source_window_rows = rest_get(f"/rest/v1/opportunities?{query}")
          rows = source_window_rows

          n = len(rows)
          mileage_count = sum(has_mileage(row) for row in rows)
          vin_count = sum(has_vin(row) for row in rows)
          condition_count = sum(has_condition(row) for row in rows)
          confidence_count = sum(has_confidence(row) for row in rows)
          source_exact_count = sum(canonical_source_ok(row) for row in rows)
          pricing_raw_count = sum(pricing_raw_present(row) for row in rows)
          provenance_count = sum(provenance_present(row) for row in rows)
          enriched_samples = [sanitize_sample(row) for row in rows if has_vin(row) or has_mileage(row) or provenance_present(row)][:5]
          accepted_quality = {
              "sample_count": n,
              "proof_window_start": proof_window_start,
              "source_filter_column": source_filter_key,
              "source_site_exact_count": source_exact_count,
              "source_site_exact_pct": pct(source_exact_count, n),
              "mileage_present": mileage_count,
              "mileage_present_pct": pct(mileage_count, n),
              "vin_present": vin_count,
              "vin_present_pct": pct(vin_count, n),
              "verified_condition_present": condition_count,
              "verified_condition_present_pct": pct(condition_count, n),
              "confidence_present": confidence_count,
              "confidence_present_pct": pct(confidence_count, n),
              "pricing_raw_present": pricing_raw_count,
              "pricing_raw_present_pct": pct(pricing_raw_count, n),
              "provenance_present": provenance_count,
              "provenance_present_pct": pct(provenance_count, n),
              "pricing_maturity_counts": count_by("pricing_maturity", rows),
              "latest_created_at": rows[0].get("created_at") if rows else None,
              "oldest_created_at_in_sample": rows[-1].get("created_at") if rows else None,
              "sanitized_enriched_samples": enriched_samples,
              "passes_original_enrichment_standard": False,
          }

          scraper_enrichment = None
          actor_output_quality = {
              "available": False,
              "reason": "no_recent_source_quality_proof_record",
              "actor_output_clean": False,
          }
          delivery_accounting = {
              "available": False,
              "reason": "no_recent_source_quality_proof_record",
              "delivery_rows": 0,
              "business_rejection_rows": 0,
              "status_counts": {},
              "reason_counts": {},
          }
          apify_token = os.environ.get("APIFY_TOKEN")
          actor_id = SOURCE_ACTOR_IDS.get(source)
          if actor_id and apify_token:
              runs = apify_get(
                  f"/acts/{actor_id}/runs?limit=5&status=SUCCEEDED&desc=true",
                  apify_token,
              ).get("data", {}).get("items", [])
              for run in runs:
                  dataset_id = run.get("defaultDatasetId")
                  if not dataset_id:
                      continue
                  items = apify_get(
                      f"/datasets/{dataset_id}/items?clean=true&limit=1000",
                      apify_token,
                  )
                  proof_rows = [
                      item for item in items
                      if item.get("record_type") == "source_quality_proof"
                      and str(item.get("source_site") or "").strip().lower() == source
                  ]
                  if proof_rows:
                      scraper_enrichment = proof_rows[-1]
                      opportunity_items = [
                          item for item in items
                          if isinstance(item, dict) and item.get("record_type") != "source_quality_proof"
                      ]
                      pushed_missing_vin = int(scraper_enrichment.get("pushed_rows_missing_vin") or 0)
                      pushed_missing_mileage = int(scraper_enrichment.get("pushed_rows_missing_mileage") or 0)
                      detail_pages_failed = int(scraper_enrichment.get("detail_pages_failed") or 0)
                      scraper_enrichment["actor_run_id"] = run.get("id")
                      scraper_enrichment["dataset_id"] = dataset_id
                      scraper_enrichment["finished_at"] = run.get("finishedAt")
                      actor_output_quality = {
                          "available": True,
                          "actor_run_id": run.get("id"),
                          "dataset_id": dataset_id,
                          "finished_at": run.get("finishedAt"),
                          "dataset_items_sampled": len(items) if isinstance(items, list) else None,
                          "opportunity_items_sampled": len(opportunity_items),
                          "pushed_rows_total": scraper_enrichment.get("pushed_rows_total"),
                          "pushed_rows_with_vin": scraper_enrichment.get("pushed_rows_with_vin"),
                          "pushed_rows_with_mileage": scraper_enrichment.get("pushed_rows_with_mileage"),
                          "pushed_rows_missing_vin": pushed_missing_vin,
                          "pushed_rows_missing_mileage": pushed_missing_mileage,
                          "pushed_rows_with_description": sum(bool(item.get("description")) for item in opportunity_items),
                          "pushed_rows_with_detail_text": sum(bool(item.get("detail_text")) for item in opportunity_items),
                          "detail_pages_attempted": scraper_enrichment.get("detail_pages_attempted"),
                          "detail_pages_fetched": scraper_enrichment.get("detail_pages_fetched"),
                          "detail_pages_failed": detail_pages_failed,
                          "actor_output_clean": pushed_missing_vin == 0
                          and pushed_missing_mileage == 0
                          and detail_pages_failed == 0,
                      }
                      break
          elif not actor_id:
              actor_output_quality["reason"] = "unsupported_source_actor"
          elif not apify_token:
              actor_output_quality["reason"] = "apify_token_missing"

          if scraper_enrichment:
              scraper_enrichment["available"] = True
              lineage_rows = rows_for_actor_run(scraper_enrichment.get("actor_run_id"))
              delivery_accounting = delivery_accounting_for_actor_run(scraper_enrichment.get("actor_run_id"))
              scraper_enrichment["accepted_opportunities_for_actor_run"] = len(lineage_rows)
              scraper_enrichment["run_lineage_proven"] = bool(lineage_rows)
              if lineage_rows:
                  rows = lineage_rows
                  n = len(rows)
                  mileage_count = sum(has_mileage(row) for row in rows)
                  vin_count = sum(has_vin(row) for row in rows)
                  condition_count = sum(has_condition(row) for row in rows)
                  confidence_count = sum(has_confidence(row) for row in rows)
                  source_exact_count = sum(canonical_source_ok(row) for row in rows)
                  pricing_raw_count = sum(pricing_raw_present(row) for row in rows)
                  provenance_count = sum(provenance_present(row) for row in rows)
                  enriched_samples = [sanitize_sample(row) for row in rows if has_vin(row) or has_mileage(row) or provenance_present(row)][:5]
                  accepted_quality.update({
                      "sample_count": n,
                      "source_site_exact_count": source_exact_count,
                      "source_site_exact_pct": pct(source_exact_count, n),
                      "mileage_present": mileage_count,
                      "mileage_present_pct": pct(mileage_count, n),
                      "vin_present": vin_count,
                      "vin_present_pct": pct(vin_count, n),
                      "verified_condition_present": condition_count,
                      "verified_condition_present_pct": pct(condition_count, n),
                      "confidence_present": confidence_count,
                      "confidence_present_pct": pct(confidence_count, n),
                      "pricing_raw_present": pricing_raw_count,
                      "pricing_raw_present_pct": pct(pricing_raw_count, n),
                      "provenance_present": provenance_count,
                      "provenance_present_pct": pct(provenance_count, n),
                      "pricing_maturity_counts": count_by("pricing_maturity", rows),
                      "latest_created_at": rows[0].get("created_at") if rows else None,
                      "oldest_created_at_in_sample": rows[-1].get("created_at") if rows else None,
                      "sanitized_enriched_samples": enriched_samples,
                  })
              scraper_enrichment["extraction_detected"] = bool(
                  scraper_enrichment.get("detail_vins_found", 0) > 0
                  or scraper_enrichment.get("detail_mileages_found", 0) > 0
              )
              scraper_enrichment["strict_filter_rejection_detected"] = bool(
                  scraper_enrichment.get("enriched_rows_rejected", 0) > 0
                  and scraper_enrichment.get("rejection_reasons")
              )
          else:
              scraper_enrichment = {
                  "available": False,
                  "reason": "no_recent_source_quality_proof_record",
                  "extraction_detected": False,
                  "strict_filter_rejection_detected": False,
              }

          accepted_quality["passes_original_enrichment_standard"] = bool(
              n > 0
              and scraper_enrichment.get("run_lineage_proven")
              and source_exact_count == n
              and pricing_raw_count == n
              and provenance_count == n
              and pct(vin_count, n) is not None
              and pct(vin_count, n) >= VIN_PASS_THRESHOLD_PCT
              and pct(mileage_count, n) is not None
              and pct(mileage_count, n) >= MILEAGE_PASS_THRESHOLD_PCT
          )

          low_yield_source_truth_detected = bool(
              scraper_enrichment.get("available")
              and scraper_enrichment.get("extraction_detected")
              and scraper_enrichment.get("strict_filter_rejection_detected")
          )
          no_eligible_source_inventory_detected = bool(
              scraper_enrichment.get("available")
              and actor_output_quality.get("available")
              and actor_output_quality.get("actor_output_clean")
              and not scraper_enrichment.get("run_lineage_proven")
              and int(scraper_enrichment.get("pushed_rows_total") or 0) == 0
              and scraper_enrichment.get("rows_excluded_unaccounted_after_prefilter") is not None
              and int(scraper_enrichment.get("rows_excluded_unaccounted_after_prefilter") or 0) == 0
          )
          governed_downstream_no_qualifying_inventory_detected = bool(
              scraper_enrichment.get("available")
              and actor_output_quality.get("available")
              and actor_output_quality.get("actor_output_clean")
              and delivery_accounting.get("available")
              and not scraper_enrichment.get("run_lineage_proven")
              and int(scraper_enrichment.get("pushed_rows_total") or 0) > 0
              and int(delivery_accounting.get("business_rejection_rows") or 0) >= int(scraper_enrichment.get("pushed_rows_total") or 0)
          )

          if scraper_enrichment.get("run_lineage_proven"):
              accepted_landing_status = "accepted_rows_present"
          elif actor_output_quality.get("available") and actor_output_quality.get("actor_output_clean"):
              accepted_landing_status = "actor_output_live_confirmed_no_accepted_rows"
          elif actor_output_quality.get("available"):
              accepted_landing_status = "dirty_actor_output"
          else:
              accepted_landing_status = "actor_output_unavailable"

          if accepted_quality["passes_original_enrichment_standard"]:
              issue10_verdict = "PASS_ORIGINAL"
          elif no_eligible_source_inventory_detected:
              issue10_verdict = "PASS_NO_ELIGIBLE_INVENTORY"
          elif governed_downstream_no_qualifying_inventory_detected:
              issue10_verdict = "PASS_NO_QUALIFYING_INVENTORY"
          else:
              issue10_verdict = "BLOCK"

          summary = {
              "source": source,
              "issue10_verdict": issue10_verdict,
              "accepted_landing_status": accepted_landing_status,
              "issue10_scope_note": (
                  "Original accepted-opportunity enrichment standard passed."
                  if issue10_verdict == "PASS_ORIGINAL"
                  else (
                      "Actor output was clean and fully accounted, but no source inventory was eligible to enter accepted opportunities."
                      if issue10_verdict == "PASS_NO_ELIGIBLE_INVENTORY"
                      else (
                          "Actor output was clean and the pushed candidate was accounted by governed downstream rejection, so no qualifying inventory entered accepted opportunities."
                          if issue10_verdict == "PASS_NO_QUALIFYING_INVENTORY"
                          else "Issue #10 remains blocked: accepted rows did not land and actor output is either unavailable, dirty, or not fully accounted."
                      )
                  )
              ),
              "low_yield_source_truth_detected": low_yield_source_truth_detected,
              "no_eligible_source_inventory_detected": no_eligible_source_inventory_detected,
              "governed_downstream_no_qualifying_inventory_detected": governed_downstream_no_qualifying_inventory_detected,
              "accepted_opportunity_quality": accepted_quality,
              "actor_output_quality": actor_output_quality,
              "delivery_accounting": delivery_accounting,
              "scraper_enrichment_attempt_quality": scraper_enrichment,
          }

          print(json.dumps(summary, indent=2, sort_keys=True))
          if issue10_verdict == "BLOCK":
              raise SystemExit(1)
          PY
