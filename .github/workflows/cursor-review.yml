name: Cursor Code Review

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  cursor-review:
    runs-on: ubuntu-latest
    steps:
      - name: Set Git default branch for quiet checkout
        run: git config --global init.defaultBranch main

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Cursor AI Code Review (PR diff)
        # AI review is advisory-only by design; business-rule validation is the gating check.
        continue-on-error: true
        if: github.event_name == 'pull_request'
        env:
          OPENROUTER_KEY: ${{ secrets.OPENROUTER_KEY }}
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          DIFF=$(git diff "$BASE_SHA".."$HEAD_SHA" -- '*.py' '*.ts' '*.tsx' '*.js' '*.sql' | head -c 60000)
          if [ -z "$DIFF" ]; then echo "No code changes to review."; exit 0; fi
          PAYLOAD=$(jq -n --arg diff "$DIFF" '{"model":"deepseek/deepseek-v3.2","messages":[{"role":"system","content":"You are a senior code reviewer for DealerScope. Flag: 1) Auth/security issues 2) Business rule violations (Premium lane: max age 4yr, max mileage 50k, bid ceiling 0.88; Standard lane: max age 10yr, max mileage 100k plus mileage-per-year constraint, bid ceiling 0.80; rust states; margin rules) 3) Silent failures 4) Data integrity 5) UX/consumer trust issues. Be concise."},{"role":"user","content":$diff}]}')
          RESPONSE=$(curl -s -X POST https://openrouter.ai/api/v1/chat/completions -H "Authorization: Bearer $OPENROUTER_KEY" -H "Content-Type: application/json" -d "$PAYLOAD")
          REVIEW=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // "No review returned"' 2>/dev/null || echo "Review unavailable")
          echo "## 🤖 Cursor AI Review" >> $GITHUB_STEP_SUMMARY
          echo "$REVIEW" >> $GITHUB_STEP_SUMMARY

      - name: Cursor AI Code Review (push to main)
        # AI review is advisory-only by design; business-rule validation is the gating check.
        continue-on-error: true
        if: github.event_name == 'push'
        env:
          OPENROUTER_KEY: ${{ secrets.OPENROUTER_KEY }}
        run: |
          HEAD="${{ github.sha }}"
          PARENT=$(git rev-parse HEAD^1 2>/dev/null || echo "")
          if [ -z "$PARENT" ]; then echo "First commit, skipping."; exit 0; fi
          DIFF=$(git diff "$PARENT".."$HEAD" -- '*.py' '*.ts' '*.tsx' '*.js' '*.sql' | head -c 60000)
          if [ -z "$DIFF" ]; then echo "No code changes."; exit 0; fi
          PAYLOAD=$(jq -n --arg diff "$DIFF" '{"model":"deepseek/deepseek-v3.2","messages":[{"role":"system","content":"You are a senior code reviewer for DealerScope. Flag: 1) Auth/security issues 2) Business rule violations (Premium lane: max age 4yr, max mileage 50k, bid ceiling 0.88; Standard lane: max age 10yr, max mileage 100k plus mileage-per-year constraint, bid ceiling 0.80; rust states; margin rules) 3) Silent failures 4) Data integrity 5) UX/consumer trust issues. Be concise."},{"role":"user","content":$diff}]}')
          RESPONSE=$(curl -s -X POST https://openrouter.ai/api/v1/chat/completions -H "Authorization: Bearer $OPENROUTER_KEY" -H "Content-Type: application/json" -d "$PAYLOAD")
          REVIEW=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // "No review returned"' 2>/dev/null || echo "Review unavailable")
          echo "## 🤖 Cursor AI Review (push)" >> $GITHUB_STEP_SUMMARY
          echo "$REVIEW" >> $GITHUB_STEP_SUMMARY

      - name: Validate Business Rules
        run: |
          set -euo pipefail
          FAILED=0
          if grep -q "PREMIUM_BID_CEILING_PCT = 0.88" backend/business_rules/constants.py \
             && grep -q "STANDARD_BID_CEILING_PCT = 0.80" backend/business_rules/constants.py; then
            echo "✅ Bid ceilings defined in canonical business_rules module"
          else
            echo "❌ Bid ceiling missing from backend/business_rules/constants.py"
            FAILED=1
          fi
          if grep -rn "HIGH_RUST_STATES" backend/business_rules/constants.py | grep -q "OH\|MI"; then
            echo "✅ Rust state filter present in business_rules"
          else
            echo "❌ Rust state filter missing from business_rules"
            FAILED=1
          fi
          if grep -rn "apify_api_[A-Za-z0-9]\{20\}\|sk-proj-[A-Za-z0-9]\|ntn_[A-Za-z0-9]" src/ backend/ webapp/ --include="*.py" --include="*.ts" --include="*.tsx" 2>/dev/null | grep -v "test\|#\|//"; then
            echo "❌ Hardcoded key found"
            FAILED=1
          else
            echo "✅ No hardcoded secrets"
          fi
          exit $FAILED
