name: Sold Comp Verifier

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Report deterministic verifier decisions without writing rows"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      limit:
        description: "Maximum candidate rows to inspect"
        required: false
        default: "100"
      run_id:
        description: "Optional Apify run id / market scout run id to verify only one bounded run"
        required: false
        default: ""

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sold-comp-verifier:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Set Git default branch for quiet checkout
        run: git config --global init.defaultBranch main

      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run deterministic sold-comp verifier
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SOLD_COMP_VERIFIER_DRY_RUN: ${{ inputs.dry_run }}
          SOLD_COMP_VERIFIER_LIMIT: ${{ inputs.limit }}
          SOLD_COMP_VERIFIER_RUN_ID: ${{ inputs.run_id }}
        run: |
          python3 -m pip install --disable-pip-version-check --no-cache-dir supabase==2.30.0
          python3 scripts/run_sold_comp_verifier.py
