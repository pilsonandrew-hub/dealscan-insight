name: Configure HiBid v2 Apify Schedule

on:
  workflow_dispatch:
    inputs:
      schedule_cron:
        description: "Apify cron for HiBid v2 cadence"
        required: false
        default: ""

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ACTOR_ID: 7s9e0eATTt1kuGGfE
  SCHEDULE_NAME: ds-hibid-v2-every-12h
  DEFAULT_SCHEDULE_CRON: "0 */12 * * *"

jobs:
  configure-hibid-v2-apify-schedule:
    runs-on: ubuntu-latest
    env:
      APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
      WEBHOOK_SECRET: ${{ secrets.APIFY_WEBHOOK_SECRET }}
      SCHEDULE_CRON: ${{ inputs.schedule_cron || '0 */12 * * *' }}
    steps:
      - name: Configure actor secret env and Apify schedule
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os
          import time
          import urllib.error
          import urllib.parse
          import urllib.request
          from datetime import datetime, timezone

          APIFY_TOKEN = os.environ["APIFY_TOKEN"]
          WEBHOOK_SECRET = os.environ["WEBHOOK_SECRET"]
          ACTOR_ID = os.environ["ACTOR_ID"]
          SCHEDULE_NAME = os.environ["SCHEDULE_NAME"]
          DEFAULT_SCHEDULE_CRON = os.environ["DEFAULT_SCHEDULE_CRON"]
          SCHEDULE_CRON = (os.environ.get("SCHEDULE_CRON") or DEFAULT_SCHEDULE_CRON).strip()
          CURRENT_YEAR = datetime.now(timezone.utc).year

          if not APIFY_TOKEN:
              raise SystemExit("APIFY_TOKEN GitHub secret is required")
          if not WEBHOOK_SECRET:
              raise SystemExit("APIFY_WEBHOOK_SECRET GitHub secret is required")

          def request(method, path, body=None):
              url = f"https://api.apify.com/v2{path}"
              data = None if body is None else json.dumps(body).encode("utf-8")
              req = urllib.request.Request(
                  url,
                  data=data,
                  method=method,
                  headers={
                      "Authorization": f"Bearer {APIFY_TOKEN}",
                      "Content-Type": "application/json",
                  },
              )
              try:
                  with urllib.request.urlopen(req, timeout=30) as response:
                      return json.load(response).get("data")
              except urllib.error.HTTPError as exc:
                  detail = exc.read().decode("utf-8", errors="replace")
                  raise RuntimeError(f"{method} {path} failed: HTTP {exc.code}: {detail}") from exc

          def paged_items(path):
              data = request("GET", path)
              if isinstance(data, dict) and "items" in data:
                  return data["items"]
              return []

          def version_sort_key(version_number):
              parts = []
              for part in str(version_number).split("."):
                  try:
                      parts.append(int(part))
                  except ValueError:
                      parts.append(-1)
              return tuple(parts)

          def wait_for_terminal_build(build_id):
              terminal = {"SUCCEEDED", "FAILED", "ABORTED", "TIMED-OUT"}
              last = {}
              for _ in range(90):
                  last = request("GET", f"/actor-builds/{build_id}")
                  status = last.get("status")
                  print(json.dumps({
                      "configured_build_id": build_id,
                      "configured_build_status": status,
                      "configured_build_number": last.get("buildNumber"),
                  }, sort_keys=True))
                  if status in terminal:
                      if status != "SUCCEEDED":
                          raise SystemExit(f"HiBid v2 build {build_id} ended with {status}")
                      return last
                  time.sleep(10)
              raise SystemExit(f"Timed out waiting for HiBid v2 build {build_id}")

          versions = paged_items(f"/actors/{ACTOR_ID}/versions?limit=100")
          if not versions:
              raise SystemExit(f"No versions found for actor {ACTOR_ID}")

          active_version = max(versions, key=lambda version: version_sort_key(version["versionNumber"]))
          active_version_number = active_version["versionNumber"]

          configured_versions = []
          for version in versions:
              version_number = version["versionNumber"]
              env_path = (
                  f"/actors/{ACTOR_ID}/versions/"
                  f"{urllib.parse.quote(version_number, safe='')}/env-vars"
              )
              env_vars = paged_items(env_path)
              env_payload = {
                  "name": "WEBHOOK_SECRET",
                  "value": WEBHOOK_SECRET,
                  "isSecret": True,
              }
              if any(item.get("name") == "WEBHOOK_SECRET" for item in env_vars):
                  request("PUT", f"{env_path}/WEBHOOK_SECRET", env_payload)
              else:
                  request("POST", env_path, env_payload)
              configured_versions.append(version_number)

          build = request("POST", f"/actors/{ACTOR_ID}/builds?version={active_version_number}&tag=latest&useCache=false&betaPackages=false")
          build = wait_for_terminal_build(build["id"])

          schedule_body = {
              "name": SCHEDULE_NAME,
              "title": "HiBid v2 12h governed source run",
              "description": (
                  "DealerScope HiBid v2 cadence. Webhook auth is provided by "
                  "the actor secret environment variable, not schedule input."
              ),
              "isEnabled": True,
              "isExclusive": True,
              "cronExpression": SCHEDULE_CRON,
              "timezone": "America/Los_Angeles",
              "actions": [
                  {
                      "type": "RUN_ACTOR",
                      "actorId": ACTOR_ID,
                      "runInput": {
                          "body": json.dumps(
                              {
                                  "maxPages": 20,
                                  "pageLength": 50,
                                  "minBid": 500,
                                  "maxBid": 75000,
                                  "minYear": CURRENT_YEAR - 10,
                                  "maxMileage": 100000,
                              },
                              sort_keys=True,
                          ),
                          "contentType": "application/json; charset=utf-8",
                      },
                      "runOptions": {
                          "build": "latest",
                          "timeoutSecs": 3600,
                          "memoryMbytes": 1024,
                      },
                  }
              ],
          }

          schedules = paged_items("/schedules?limit=1000")
          existing = next((item for item in schedules if item.get("name") == SCHEDULE_NAME), None)
          if existing:
              schedule = request("PUT", f"/schedules/{existing['id']}", schedule_body)
              action = "updated"
          else:
              schedule = request("POST", "/schedules", schedule_body)
              action = "created"

          print(json.dumps({
              "actor_id": ACTOR_ID,
              "configured_secret_env_versions": configured_versions,
              "configured_build_id": build.get("id"),
              "configured_build_number": build.get("buildNumber"),
              "schedule_action": action,
              "schedule_id": schedule.get("id"),
              "schedule_name": schedule.get("name"),
              "cron": schedule.get("cronExpression"),
              "timezone": schedule.get("timezone"),
              "is_enabled": schedule.get("isEnabled"),
              "next_run_at": schedule.get("nextRunAt"),
          }, indent=2, sort_keys=True))
          PY
