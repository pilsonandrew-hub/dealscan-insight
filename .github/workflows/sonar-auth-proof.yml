name: Sonar Auth Proof

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  proof:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      BACKEND_BASE_URL: https://dealscan-insight-production.up.railway.app
      FRONTEND_BASE_URL: https://dealscan-insight.vercel.app
    steps:
      - name: Prove Sonar auth guard and authenticated access
        shell: bash
        run: |
          set -euo pipefail
          python3 << 'PY'
          import json
          import os
          import secrets
          import string
          import urllib.error
          import urllib.request

          supabase_url = os.environ["SUPABASE_URL"].rstrip("/")
          anon_key = os.environ["SUPABASE_ANON_KEY"]
          service_key = os.environ["SUPABASE_SERVICE_ROLE_KEY"]
          backend_base = os.environ["BACKEND_BASE_URL"].rstrip("/")
          frontend_base = os.environ["FRONTEND_BASE_URL"].rstrip("/")
          run_id = os.environ.get('GITHUB_RUN_ID', secrets.token_hex(4))
          email = f"sonar-proof-{run_id}@example.com"
          other_email = f"sonar-proof-other-{run_id}@example.com"
          password = "Proof-" + secrets.token_urlsafe(18) + "-A1!"
          other_password = "Proof-" + secrets.token_urlsafe(18) + "-B2!"
          created_user_id = None
          other_user_id = None

          def request_json(url, *, method="GET", payload=None, headers=None, expected=None):
              body = json.dumps(payload).encode() if payload is not None else None
              req_headers = {"Content-Type": "application/json", **(headers or {})}
              req = urllib.request.Request(url, data=body, method=method, headers=req_headers)
              try:
                  with urllib.request.urlopen(req, timeout=30) as resp:
                      text = resp.read().decode()
                      data = json.loads(text) if text else {}
                      if expected and resp.status not in expected:
                          raise RuntimeError(f"unexpected HTTP {resp.status} from {url}")
                      return resp.status, data
              except urllib.error.HTTPError as exc:
                  text = exc.read().decode(errors="replace")
                  data = None
                  try:
                      data = json.loads(text)
                  except Exception:
                      data = {"raw": text[:300]}
                  if expected and exc.code in expected:
                      return exc.code, data
                  raise RuntimeError(f"HTTP {exc.code} from {url}: {data}") from exc

          admin_headers = {"apikey": service_key, "Authorization": f"Bearer {service_key}"}

          try:
              # Unauthenticated requests must fail closed through Vercel rewrite and direct Railway.
              unauth_vercel_status, _ = request_json(
                  f"{frontend_base}/api/sonar/status/not-a-real-job",
                  headers={},
                  expected={401},
              )
              unauth_backend_status, _ = request_json(
                  f"{backend_base}/api/sonar/status/not-a-real-job",
                  headers={},
                  expected={401},
              )
              unauth_backend_search, _ = request_json(
                  f"{backend_base}/api/sonar/search",
                  method="POST",
                  headers={},
                  payload={"query": "ford", "min_price": 0, "max_price": 75000, "extended": False},
                  expected={401},
              )
              invalid_token_status, _ = request_json(
                  f"{backend_base}/api/sonar/status/not-a-real-job",
                  headers={"Authorization": "Bearer definitely-invalid-token"},
                  expected={401},
              )

              create_status, created = request_json(
                  f"{supabase_url}/auth/v1/admin/users",
                  method="POST",
                  headers=admin_headers,
                  payload={"email": email, "password": password, "email_confirm": True},
                  expected={200},
              )
              created_user_id = created.get("id")
              if not created_user_id:
                  raise RuntimeError("admin user creation did not return id")
              other_create_status, other_created = request_json(
                  f"{supabase_url}/auth/v1/admin/users",
                  method="POST",
                  headers=admin_headers,
                  payload={"email": other_email, "password": other_password, "email_confirm": True},
                  expected={200},
              )
              other_user_id = other_created.get("id")
              if not other_user_id:
                  raise RuntimeError("second admin user creation did not return id")

              token_status, token_data = request_json(
                  f"{supabase_url}/auth/v1/token?grant_type=password",
                  method="POST",
                  headers={"apikey": anon_key},
                  payload={"email": email, "password": password},
                  expected={200},
              )
              access_token = token_data.get("access_token")
              if not access_token:
                  raise RuntimeError("password grant did not return access token")
              other_token_status, other_token_data = request_json(
                  f"{supabase_url}/auth/v1/token?grant_type=password",
                  method="POST",
                  headers={"apikey": anon_key},
                  payload={"email": other_email, "password": other_password},
                  expected={200},
              )
              other_access_token = other_token_data.get("access_token")
              if not other_access_token:
                  raise RuntimeError("second password grant did not return access token")

              auth_headers = {"Authorization": f"Bearer {access_token}", "Content-Type": "application/json"}
              search_status, search_data = request_json(
                  f"{backend_base}/api/sonar/search",
                  method="POST",
                  headers=auth_headers,
                  payload={"query": "ford", "min_price": 0, "max_price": 75000, "extended": False},
                  expected={200},
              )
              job_id = search_data.get("job_id")
              results = search_data.get("results")
              if not job_id or not isinstance(results, list):
                  raise RuntimeError("search did not return job_id/results list")

              status_status, status_data = request_json(
                  f"{backend_base}/api/sonar/status/{job_id}",
                  headers={"Authorization": f"Bearer {access_token}"},
                  expected={200},
              )
              status_results = status_data.get("results")
              if not isinstance(status_results, list):
                  raise RuntimeError("status did not return results list")
              cross_user_status, _ = request_json(
                  f"{backend_base}/api/sonar/status/{job_id}",
                  headers={"Authorization": f"Bearer {other_access_token}"},
                  expected={403},
              )

              print(json.dumps({
                  "unauth_vercel_status": unauth_vercel_status,
                  "unauth_backend_status": unauth_backend_status,
                  "unauth_backend_search": unauth_backend_search,
                  "invalid_token_status": invalid_token_status,
                  "created_temp_user": True,
                  "created_second_temp_user": True,
                  "auth_search_status": search_status,
                  "auth_search_results_count": len(results),
                  "job_id_present": True,
                  "auth_status_status": status_status,
                  "auth_status_results_count": len(status_results),
                  "cross_user_status": cross_user_status,
              }, indent=2, sort_keys=True))
          finally:
              deletion_failures = []
              for label, user_id in (("temp_user", created_user_id), ("second_temp_user", other_user_id)):
                  if not user_id:
                      continue
                  try:
                      request_json(
                          f"{supabase_url}/auth/v1/admin/users/{user_id}",
                          method="DELETE",
                          headers=admin_headers,
                          expected={200, 204},
                      )
                      print(f"{label}_deleted=true")
                  except Exception as exc:
                      print(f"{label}_deleted=false reason={exc}")
                      deletion_failures.append(exc)
              if deletion_failures:
                  raise deletion_failures[0]
          PY
