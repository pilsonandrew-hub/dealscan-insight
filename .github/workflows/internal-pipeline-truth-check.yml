name: Internal Pipeline Truth Check

on:
  workflow_dispatch:
    inputs:
      opportunity_id:
        description: "Optional opportunity id for exact condition-evidence proof"
        required: false
        type: string

permissions:
  contents: read

env:
  BACKEND_BASE_URL: ${{ vars.BACKEND_BASE_URL || 'https://dealscan-insight-production.up.railway.app' }}

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Fetch sanitized internal pipeline truth
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OPPORTUNITY_ID: ${{ github.event.inputs.opportunity_id || '' }}
        run: |
          set -euo pipefail
          python3 <<'PY'
          import json
          import os
          import sys
          import urllib.error
          import urllib.request

          supabase_url = os.environ["SUPABASE_URL"].rstrip("/")
          service_key = os.environ["SUPABASE_SERVICE_ROLE_KEY"]
          backend_base_url = os.environ["BACKEND_BASE_URL"].rstrip("/")
          opportunity_id = os.environ.get("OPPORTUNITY_ID", "").strip()

          req = urllib.request.Request(
              f"{supabase_url}/rest/v1/app_config?select=key,value&key=eq.INTERNAL_API_SECRET",
              headers={
                  "apikey": service_key,
                  "Authorization": f"Bearer {service_key}",
              },
          )
          with urllib.request.urlopen(req, timeout=30) as resp:
              rows = json.loads(resp.read().decode())

          internal_secret = ""
          if rows and isinstance(rows[0], dict):
              internal_secret = str(rows[0].get("value") or "").strip()
          if not internal_secret:
              print("INTERNAL_API_SECRET missing from app_config", file=sys.stderr)
              raise SystemExit(1)

          truth_req = urllib.request.Request(
              f"{backend_base_url}/api/internal/pipeline-truth",
              headers={"X-Internal-Secret": internal_secret},
          )
          try:
              with urllib.request.urlopen(truth_req, timeout=45) as resp:
                  truth = json.loads(resp.read().decode())
          except urllib.error.HTTPError as exc:
              print(f"pipeline-truth HTTP {exc.code}", file=sys.stderr)
              print(exc.read().decode(errors="replace")[:500], file=sys.stderr)
              raise

          opportunities = truth.get("opportunities") or {}
          gate_breakdown = opportunities.get("active_dos80_gate_breakdown") or []
          if not isinstance(gate_breakdown, list):
              print("active_dos80_gate_breakdown is not a list", file=sys.stderr)
              raise SystemExit(1)
          if opportunities.get("active_dos80_sample", 0) and not gate_breakdown:
              print("active_dos80_gate_breakdown missing despite active DOS>=80 sample", file=sys.stderr)
              raise SystemExit(1)
          for item in gate_breakdown:
              if "eligible" not in item or "blocking_reasons" not in item:
                  print("gate breakdown item missing eligible/blocking_reasons", file=sys.stderr)
                  raise SystemExit(1)

          sanitized = {
              "alerts_runtime": truth.get("alerts_runtime"),
              "alerts": truth.get("alerts"),
              "deliveries": truth.get("deliveries"),
              "opportunities": {
                  "active_dos80_sample": opportunities.get("active_dos80_sample"),
                  "active_dos80_gate_breakdown_count": len(gate_breakdown),
                  "active_dos80_alert_eligible_sample": opportunities.get("active_dos80_alert_eligible_sample"),
                  "active_dos80_gate_blocker_counts_sample": opportunities.get("active_dos80_gate_blocker_counts_sample"),
                  "active_dos80_condition_counts_sample": opportunities.get("active_dos80_condition_counts_sample"),
                  "active_dos80_condition_blocker_basis_counts_sample": opportunities.get("active_dos80_condition_blocker_basis_counts_sample"),
                  "active_dos80_condition_blocker_basis_by_source_sample": opportunities.get("active_dos80_condition_blocker_basis_by_source_sample"),
                  "active_dos80_condition_blocker_basis_samples": opportunities.get("active_dos80_condition_blocker_basis_samples"),
                  "active_dos80_condition_storage_gap_count_sample": opportunities.get("active_dos80_condition_storage_gap_count_sample"),
                  "active_dos80_condition_storage_gap_by_source_sample": opportunities.get("active_dos80_condition_storage_gap_by_source_sample"),
                  "active_dos80_condition_storage_gap_samples": opportunities.get("active_dos80_condition_storage_gap_samples"),
                  "active_dos80_pricing_maturity_counts_sample": opportunities.get("active_dos80_pricing_maturity_counts_sample"),
                  "active_dos80_gate_breakdown_sample": gate_breakdown[:5],
              },
          }
          if opportunity_id:
              proof_req = urllib.request.Request(
                  f"{backend_base_url}/api/internal/opportunity-condition-proof/{opportunity_id}",
                  headers={"X-Internal-Secret": internal_secret},
              )
              try:
                  with urllib.request.urlopen(proof_req, timeout=45) as resp:
                      condition_proof = json.loads(resp.read().decode())
              except urllib.error.HTTPError as exc:
                  print(f"opportunity-condition-proof HTTP {exc.code}", file=sys.stderr)
                  print(exc.read().decode(errors="replace")[:500], file=sys.stderr)
                  raise
              opportunity = condition_proof.get("opportunity") or {}
              if "condition_evidence_fields" not in opportunity:
                  print("opportunity condition proof missing condition_evidence_fields", file=sys.stderr)
                  raise SystemExit(1)
              with open("/tmp/opportunity-condition-proof.json", "w", encoding="utf-8") as handle:
                  json.dump(condition_proof, handle, indent=2, sort_keys=True)
              sanitized["opportunity_condition_proof"] = {
                  "selector": condition_proof.get("selector"),
                  "opportunity": {
                      "id": opportunity.get("id"),
                      "source_site": opportunity.get("source_site"),
                      "title": opportunity.get("title"),
                      "year": opportunity.get("year"),
                      "mileage": opportunity.get("mileage"),
                      "condition_grade": opportunity.get("condition_grade"),
                      "condition_blocker_basis": opportunity.get("condition_blocker_basis"),
                      "condition_signals": opportunity.get("condition_signals"),
                      "source_text_excerpt": opportunity.get("source_text_excerpt"),
                      "condition_evidence_fields": opportunity.get("condition_evidence_fields"),
                      "condition_backfill_assessment": opportunity.get("condition_backfill_assessment"),
                      "source_identity": opportunity.get("source_identity"),
                      "raw_data_keys_present": opportunity.get("raw_data_keys_present"),
                      "created_at": opportunity.get("created_at"),
                      "updated_at": opportunity.get("updated_at"),
                      "listing_id": opportunity.get("listing_id"),
                  },
              }
          print(json.dumps(sanitized, indent=2, sort_keys=True))
          PY

      - name: Trace recovered source condition evidence
        if: ${{ github.event.inputs.opportunity_id != '' }}
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
        run: |
          set -euo pipefail
          RUN_ID="$(python3 - <<'PY'
          import json

          with open("/tmp/opportunity-condition-proof.json", "r", encoding="utf-8") as handle:
              proof = json.load(handle)
          opportunity = proof.get("opportunity") or {}
          source_identity = opportunity.get("source_identity") or {}
          print(source_identity.get("actor_run_id") or source_identity.get("apify_run_id") or "")
          PY
          )"
          if [ -z "$RUN_ID" ]; then
            echo "source condition trace missing source run id" >&2
            exit 1
          fi
          python3 scripts/trace_condition_source_evidence.py \
            --condition-proof-json /tmp/opportunity-condition-proof.json \
            --run-id "$RUN_ID" \
            > /tmp/source-condition-trace.json
          python3 - <<'PY'
          import json

          with open("/tmp/source-condition-trace.json", "r", encoding="utf-8") as handle:
              trace = json.load(handle)
          print(json.dumps({"source_condition_trace": trace}, indent=2, sort_keys=True))
          PY
