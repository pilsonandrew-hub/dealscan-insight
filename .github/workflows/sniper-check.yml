name: SniperScope Check

# DISABLED — Now runs via internal APScheduler on Railway (see webapp/scheduler.py).
# Kept as backup for manual testing only.
on:
  # schedule:
  #   - cron: '*/5 * * * *'
  # Allow manual trigger for testing/fallback
  workflow_dispatch:

jobs:
  sniper-check:
    name: Fire sniper alerts
    runs-on: ubuntu-latest
    timeout-minutes: 2
    env:
      BACKEND_BASE_URL: ${{ vars.BACKEND_BASE_URL || 'https://dealscan-insight-production.up.railway.app' }}

    steps:
      - name: Call /api/sniper/check
        env:
          SNIPER_CHECK_SECRET: ${{ secrets.SNIPER_CHECK_SECRET }}
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${SNIPER_CHECK_SECRET}" \
            -H "Content-Type: application/json" \
            ${BACKEND_BASE_URL}/api/sniper/check)

          echo "HTTP status: $STATUS"

          if [ "$STATUS" -lt 200 ] || [ "$STATUS" -ge 300 ]; then
            echo "ERROR: Sniper check returned HTTP $STATUS"
            exit 1
          fi

          echo "Sniper check OK"
