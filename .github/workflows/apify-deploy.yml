name: Deploy Apify Actors

on:
  push:
    branches: [main]
    paths:
      - 'apify/actors/**'

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}

    steps:
      - name: Set Git default branch for quiet checkout
        run: git config --global init.defaultBranch main

      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Deploy changed actors
        run: |
          python3 << 'PYEOF'
          import json, os, subprocess, sys, urllib.request, ssl
          from pathlib import Path

          TOKEN = os.environ["APIFY_TOKEN"]

          ACTOR_MAP = {
              "ds-hibid-v2":    "7s9e0eATTt1kuGGfE",
              "ds-publicsurplus": "9xxQLlRsROnSgA42i",
              "ds-govdeals":    "CuKaIAcWyFS0EPrAz",
              "ds-govdeals-sold": "Ui7FeFY4mIVPnU1fH",
              "ds-municibid":   "svmsItf3CRBZuIntp",
              "ds-gsaauctions": "fvDnYmGuFBCrwpEi9",
              "ds-allsurplus":  "gYGIfHeYeN3EzmLnB",
              "ds-govplanet":   "pO2t5UDoSVmO1gvKJ",
              "ds-proxibid":    "bxhncvtHEP712WX2e",
              "ds-jjkane":      "lvb7T6VMFfNUQpqlq",
              "ds-usgovbid":    "6XO9La81aEmtsCT3g",
              "ds-bidspotter":  "5Eu3hfCcBBdzp6I1u",
              "ds-equipmentfacts": "0XjoegYZVcPldLstl",
          }

          ctx = ssl.create_default_context()

          def api(method, path, data=None):
              # Always include token in URL AND Authorization header
              sep = "&" if "?" in path else "?"
              url = f"https://api.apify.com/v2{path}{sep}token={TOKEN}"
              body = json.dumps(data).encode() if data else None
              headers = {"Authorization": f"Bearer {TOKEN}"}
              if body:
                  headers["Content-Type"] = "application/json"
              req = urllib.request.Request(url, data=body, method=method, headers=headers)
              try:
                  resp = urllib.request.urlopen(req, context=ctx)
                  return json.loads(resp.read())
              except urllib.error.HTTPError as e:
                  print(f"HTTP {e.code}: {e.read().decode()[:200]}")
                  return {}

          # NOTE: When manually triggering deploys, always use JS-safe comments:
          # echo "// deploy $(date)" >> apify/actors/ds-xxx/src/main.js

          # Find changed actor dirs
          result = subprocess.run(
              ["git", "diff", "--name-only", "HEAD~1", "HEAD"],
              capture_output=True, text=True
          )
          changed = set()
          for line in result.stdout.splitlines():
              parts = line.split("/")
              if len(parts) >= 3 and parts[0] == "apify" and parts[1] == "actors":
                  changed.add(parts[2])

          if not changed:
              print("No actor changes detected")
              sys.exit(0)

          print(f"Changed actors: {changed}")

          for actor_dir in changed:
              actor_id = ACTOR_MAP.get(actor_dir)
              if not actor_id:
                  print(f"⚠️  No Apify ID for {actor_dir} — skipping")
                  continue

              src_dir = f"apify/actors/{actor_dir}"
              if not os.path.isdir(src_dir):
                  print(f"⚠️  Directory {src_dir} not found — skipping")
                  continue

              # Get version number
              actor_data = api("GET", f"/acts/{actor_id}")
              versions = actor_data.get("data", {}).get("versions", [])
              if not versions:
                  print(f"⚠️  No versions for {actor_id} — skipping")
                  continue
              version = versions[-1]["versionNumber"]

              print(f"🚀 Deploying {actor_dir} → {actor_id} v{version}")

              # Read source files
              main_js = open(f"{src_dir}/src/main.js").read()
              try:
                  pkg = open(f"{src_dir}/package.json").read()
              except:
                  pkg = '{"name":"actor","version":"1.0.0","type":"module","scripts":{"start":"node src/main.js"},"dependencies":{"apify":"^3.0.0","crawlee":"^3.0.0"}}'
              try:
                  dockerfile = open(f"{src_dir}/Dockerfile").read()
              except:
                  dockerfile = "FROM apify/actor-node-playwright-chrome:20\nCOPY package*.json ./\nRUN npm install --only=prod\nCOPY . ./"

              # Include all first-level JS modules under src/. Actors may import helper
              # modules; omitting one can make an Apify build pass but runtime fail.
              source_files = [
                  {"name": "package.json", "format": "TEXT", "content": pkg},
                  {"name": "Dockerfile", "format": "TEXT", "content": dockerfile},
              ]
              for src_file in sorted(Path(src_dir, "src").glob("*.js")):
                  actor_source_name = f"src/{src_file.name}"
                  source_files.append({"name": actor_source_name, "format": "TEXT", "content": src_file.read_text()})
                  print(f"  + included {actor_source_name}")

              # Upload source
              result = api("PUT", f"/acts/{actor_id}/versions/{version}", {"sourceFiles": source_files})
              if "error" in result:
                  print(f"❌ Upload failed: {result}")
                  continue
              print(f"✅ Source uploaded")

              # Trigger rebuild
              build = api("POST", f"/acts/{actor_id}/builds?version={version}&tag=latest&useCache=false&betaPackages=false")
              build_id = build.get("data", {}).get("id", "?")
              print(f"🔨 Build triggered: {build_id}")

          print("Deploy complete")
          PYEOF
