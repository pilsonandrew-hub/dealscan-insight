name: Saved Searches Check

# Runs every 30 minutes to alert users when new deals match their saved searches.
on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  saved-searches-check:
    name: Check saved searches for new matches
    runs-on: ubuntu-latest
    timeout-minutes: 3
    env:
      BACKEND_BASE_URL: ${{ vars.BACKEND_BASE_URL || 'https://dealscan-insight-production.up.railway.app' }}

    steps:
      - name: Call /api/saved-searches/check
        env:
          SAVED_SEARCH_SECRET: ${{ secrets.SAVED_SEARCH_SECRET }}
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${SAVED_SEARCH_SECRET}" \
            -H "Content-Type: application/json" \
            ${BACKEND_BASE_URL}/api/saved-searches/check)

          echo "HTTP status: $STATUS"

          if [ "$STATUS" -lt 200 ] || [ "$STATUS" -ge 300 ]; then
            echo "ERROR: Saved searches check returned HTTP $STATUS"
            exit 1
          fi

          echo "Saved searches check OK"
