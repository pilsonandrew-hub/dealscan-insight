name: DealerScope Deal Alerts

on:
  schedule:
    - cron: '0 * * * *'   # every hour
  workflow_dispatch:

jobs:
  deal-alerts:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: "-1003672399222"
    steps:
      - uses: actions/checkout@v4

      - name: Run deal alerts
        env:
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: "-1003672399222"
        run: |
          python3 << 'PYEOF'
          import json, urllib.request, ssl, datetime, sys, os

          SUPABASE_URL = "https://lbnxzvqppccajllsqaaw.supabase.co"
          SERVICE_KEY = os.environ["SUPABASE_SERVICE_KEY"]
          BOT_TOKEN = os.environ["BOT_TOKEN"]
          CHAT_ID = os.environ["CHAT_ID"]

          ctx = ssl.create_default_context()

          def supabase_get(path):
              req = urllib.request.Request(
                  f"{SUPABASE_URL}/rest/v1/{path}",
                  headers={"Authorization": f"Bearer {SERVICE_KEY}", "apikey": SERVICE_KEY}
              )
              with urllib.request.urlopen(req, context=ctx) as r:
                  return json.loads(r.read())

          def supabase_post(table, row):
              payload = json.dumps(row).encode()
              req = urllib.request.Request(
                  f"{SUPABASE_URL}/rest/v1/{table}",
                  data=payload,
                  headers={"Authorization": f"Bearer {SERVICE_KEY}", "apikey": SERVICE_KEY,
                           "Content-Type": "application/json", "Prefer": "return=minimal"},
                  method="POST"
              )
              with urllib.request.urlopen(req, context=ctx) as r:
                  return r.status

          def send_telegram(text):
              payload = json.dumps({"chat_id": CHAT_ID, "text": text, "parse_mode": "HTML"}).encode()
              req = urllib.request.Request(
                  f"https://api.telegram.org/bot{BOT_TOKEN}/sendMessage",
                  data=payload,
                  headers={"Content-Type": "application/json"},
                  method="POST"
              )
              with urllib.request.urlopen(req, context=ctx) as r:
                  return json.loads(r.read())

          alerted_ids = set()
          try:
              logs = supabase_get("alert_log?select=opportunity_id&channel=eq.telegram")
              alerted_ids = {r["opportunity_id"] for r in logs if r.get("opportunity_id")}
          except:
              pass

          hot_deals = supabase_get(
              "opportunities?select=id,title,year,make,model,state,current_bid,dos_score,listing_url"
              "&dos_score=gte.80&order=dos_score.desc&limit=10"
          )

          new_alerts = [d for d in hot_deals if d["id"] not in alerted_ids]

          if not new_alerts:
              print("No new hot deals to alert")
              sys.exit(0)

          print(f"Found {len(new_alerts)} new hot deals")

          for deal in new_alerts:
              title = deal.get("title", "Unknown Vehicle")
              bid = deal.get("current_bid", 0)
              dos = deal.get("dos_score", 0)
              state = deal.get("state", "??")
              url = deal.get("listing_url", "")

              msg = (f"🔥 <b>HOT DEAL — DOS {dos}</b>\n\n"
                     f"<b>{title}</b>\n💰 Bid: <b>${bid:,.0f}</b>\n📍 {state}\n"
                     f"\n<a href=\"{url}\">View listing →</a>")
              try:
                  send_telegram(msg)
                  print(f"  ✅ {title} | DOS:{dos}")
                  supabase_post("alert_log", {
                      "opportunity_id": deal["id"], "channel": "telegram",
                      "vehicle_title": title[:200], "dos_score": dos,
                      "delivery_state": "sent",
                      "sent_at": datetime.datetime.utcnow().isoformat()
                  })
              except Exception as e:
                  print(f"  ❌ {title}: {e}")
          PYEOF
