name: DealerScope Supabase Live Inspection

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  read-only-live-inspection:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run read-only Supabase aggregate inspection
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          python3 scripts/supabase_live_inspection.py
