name: Run Apify Actor

on:
  workflow_dispatch:
    inputs:
      actor:
        description: "Actor name to run"
        required: true
        default: "ds-proxibid"
      max_items:
        description: "Max items input"
        required: false
        default: "200"
      govdeals_sold_max_items:
        description: "Max items for bounded GovDeals sold proof runs"
        required: false
        default: "25"
      max_detail_pages:
        description: "Max detail pages input"
        required: false
        default: "200"
      target_categories:
        description: "Comma-separated Proxibid category slugs, e.g. sedans,suv-s,coupes"
        required: false
        default: ""
      max_pages:
        description: "GovDeals maxPages input for bounded proof runs"
        required: false
        default: "1"
      runtime_budget_ms:
        description: "GovDeals runtimeBudgetMs input for bounded proof runs"
        required: false
        default: "240000"
      min_bid:
        description: "GovDeals minBid input"
        required: false
        default: "500"
      max_bid:
        description: "GovDeals maxBid input"
        required: false
        default: "75000"
      search_query:
        description: "Optional GovDeals searchQuery input"
        required: false
        default: ""

permissions:
  contents: read

jobs:
  run-actor:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Run selected Apify actor and wait for completion
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          ACTOR_NAME: ${{ inputs.actor }}
          MAX_ITEMS: ${{ inputs.max_items }}
          GOVDEALS_SOLD_MAX_ITEMS: ${{ inputs.govdeals_sold_max_items }}
          MAX_DETAIL_PAGES: ${{ inputs.max_detail_pages }}
          TARGET_CATEGORIES: ${{ inputs.target_categories }}
          MAX_PAGES: ${{ inputs.max_pages }}
          RUNTIME_BUDGET_MS: ${{ inputs.runtime_budget_ms }}
          MIN_BID: ${{ inputs.min_bid }}
          MAX_BID: ${{ inputs.max_bid }}
          SEARCH_QUERY: ${{ inputs.search_query }}
        run: |
          set -euo pipefail
          python3 <<'PY'
          import json
          import os
          import time
          from datetime import datetime, timezone
          import urllib.parse
          import urllib.request

          token = os.environ["APIFY_TOKEN"]
          actor_name = os.environ.get("ACTOR_NAME", "ds-proxibid")
          actor_map = {
              "ds-proxibid": "bxhncvtHEP712WX2e",
              "ds-govdeals": "CuKaIAcWyFS0EPrAz",
              "ds-govdeals-sold": "Ui7FeFY4mIVPnU1fH",
          }
          actor_id = actor_map.get(actor_name)
          if not actor_id:
              raise SystemExit(f"Unsupported actor: {actor_name}")

          def api(method, path, payload=None):
              sep = "&" if "?" in path else "?"
              url = f"https://api.apify.com/v2{path}{sep}token={urllib.parse.quote(token)}"
              data = json.dumps(payload or {}).encode() if payload is not None else None
              req = urllib.request.Request(
                  url,
                  data=data,
                  method=method,
                  headers={"Content-Type": "application/json"},
              )
              with urllib.request.urlopen(req, timeout=60) as resp:
                  return json.loads(resp.read().decode())

          if actor_name == "ds-govdeals":
              actor_input = {
                  "maxPages": int(os.environ.get("MAX_PAGES") or "1"),
                  "runtimeBudgetMs": int(os.environ.get("RUNTIME_BUDGET_MS") or "240000"),
                  "minBid": int(os.environ.get("MIN_BID") or "500"),
                  "maxBid": int(os.environ.get("MAX_BID") or "75000"),
              }
              search_query = (os.environ.get("SEARCH_QUERY") or "").strip()
              if search_query:
                  actor_input["searchQuery"] = search_query
          elif actor_name == "ds-govdeals-sold":
              actor_input = {
                  "maxPages": int(os.environ.get("MAX_PAGES") or "1"),
                  "maxItems": int(os.environ.get("GOVDEALS_SOLD_MAX_ITEMS") or "25"),
              }
              search_query = (os.environ.get("SEARCH_QUERY") or "").strip()
              if search_query:
                  actor_input["searchQuery"] = search_query
          else:
              actor_input = {
                  "maxItems": int(os.environ.get("MAX_ITEMS") or "200"),
                  "maxDetailPages": int(os.environ.get("MAX_DETAIL_PAGES") or "200"),
              }
              target_categories = (os.environ.get("TARGET_CATEGORIES") or "").strip()
              if target_categories:
                  actor_input["targetCategories"] = target_categories
          started = api("POST", f"/acts/{actor_id}/runs", actor_input).get("data", {})
          run_id = started.get("id")
          if not run_id:
              raise SystemExit("Apify did not return a run id")
          print(json.dumps({"actor": actor_name, "run_id": run_id, "status": started.get("status")}, sort_keys=True))

          terminal = {"SUCCEEDED", "FAILED", "TIMED-OUT", "ABORTED"}
          last = started
          for _ in range(90):
              time.sleep(20)
              last = api("GET", f"/actor-runs/{run_id}").get("data", {})
              status = last.get("status")
              print(json.dumps({"run_id": run_id, "status": status}, sort_keys=True))
              if status in terminal:
                  break
          else:
              raise SystemExit("Timed out waiting for Apify actor run")

          dataset_id = last.get("defaultDatasetId")
          summary = {
              "actor": actor_name,
              "run_id": run_id,
              "status": last.get("status"),
              "dataset_id": dataset_id,
              "started_at": last.get("startedAt"),
              "finished_at": last.get("finishedAt"),
          }
          if dataset_id:
              items = api("GET", f"/datasets/{dataset_id}/items?clean=true&limit=1000")
              summary["dataset_items_sampled"] = len(items) if isinstance(items, list) else None
              proofs = [item for item in items if isinstance(item, dict) and item.get("record_type") == "source_quality_proof"]
              if proofs:
                  proof = proofs[-1]
                  summary["source_quality_proof"] = {
                      key: proof.get(key)
                      for key in (
                          "found_rows_total",
                          "prefilter_passed_rows_total",
                          "pushed_rows_total",
                          "pushed_rows_with_vin",
                          "pushed_rows_with_mileage",
                          "pushed_rows_missing_vin",
                          "pushed_rows_missing_mileage",
                          "rows_excluded_missing_required_data",
                          "rows_excluded_missing_vin",
                          "rows_excluded_missing_mileage",
                          "rows_excluded_after_detail_attempt",
                          "rows_excluded_without_detail_attempt",
                          "rows_excluded_out_of_scope",
                          "rows_excluded_not_completed_sale",
                          "completed_sale_rejection_reasons",
                          "target_search_queries",
                          "query_diagnostics",
                          "out_of_scope_examples",
                          "max_pages_total",
                          "detail_pages_attempted",
                          "detail_pages_fetched",
                          "detail_pages_failed",
                          "detail_vins_found",
                          "detail_mileages_found",
                          "enriched_rows_accepted",
                          "enriched_rows_rejected",
                          "rejection_reasons",
                      )
                  }
              opportunity_items = [
                  item for item in items
                  if isinstance(item, dict) and item.get("record_type") != "source_quality_proof"
              ]
              if actor_name == "ds-govdeals-sold":
                  now = datetime.now(timezone.utc)
                  date_fields = ("sale_date", "auction_end_time", "auction_end_date", "auctionEndUtc", "assetAuctionEndDateUtc")

                  def parse_date(value):
                      if value in (None, ""):
                          return None
                      try:
                          dt = datetime.fromisoformat(str(value).replace("Z", "+00:00"))
                          if dt.tzinfo is None:
                              dt = dt.replace(tzinfo=timezone.utc)
                          return dt
                      except ValueError:
                          return None

                  field_summary = {}
                  for field in date_fields:
                      values = [item.get(field) for item in opportunity_items if item.get(field) not in (None, "")]
                      parsed = [parse_date(value) for value in values]
                      valid = [value for value in parsed if value is not None]
                      field_summary[field] = {
                          "present": len(values),
                          "valid": len(valid),
                          "invalid": len(values) - len(valid),
                          "future": sum(value > now for value in valid),
                          "past_or_now": sum(value <= now for value in valid),
                      }
                  future_sold_rows = sum(
                      1
                      for item in opportunity_items
                      if any(
                          (parsed := parse_date(item.get(field))) is not None and parsed > now
                          for field in date_fields
                      )
                  )
                  summary["sold_date_diagnostics"] = {
                      "rows_sampled": len(opportunity_items),
                      "date_fields": field_summary,
                      "future_sold_rows": future_sold_rows,
                      "rows_with_sold_price": sum(
                          item.get("sold_price") not in (None, "", 0) or item.get("sale_price") not in (None, "", 0)
                          for item in opportunity_items
                      ),
                      "rows_with_vehicle_identity": sum(
                          bool(item.get("year") and item.get("make") and item.get("model"))
                          for item in opportunity_items
                      ),
                  }
                  if future_sold_rows:
                      print(json.dumps(summary, indent=2, sort_keys=True))
                      raise SystemExit("GovDeals sold actor emitted future-dated rows")
              summary["pushed_rows_with_description"] = sum(bool(item.get("description")) for item in opportunity_items)
              summary["pushed_rows_with_detail_text"] = sum(bool(item.get("detail_text")) for item in opportunity_items)
              if actor_name != "ds-govdeals-sold":
                  summary["description_samples"] = [
                      {
                          "title": str(item.get("title") or "")[:120],
                          "description_present": bool(item.get("description")),
                          "detail_text_present": bool(item.get("detail_text")),
                          "description_excerpt": str(item.get("description") or item.get("detail_text") or "")[:240],
                      }
                      for item in opportunity_items[:5]
                  ]
          print(json.dumps(summary, indent=2, sort_keys=True))
          if last.get("status") != "SUCCEEDED":
              raise SystemExit(1)
          PY
