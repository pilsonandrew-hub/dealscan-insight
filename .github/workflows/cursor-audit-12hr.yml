name: DealerScope Automated Audit (12hr)

on:
  schedule:
    - cron: '0 */12 * * *'   # Every 12 hours
  workflow_dispatch:          # Manual trigger

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Set Git default branch for quiet checkout
        run: git config --global init.defaultBranch main

      - uses: actions/checkout@v6

      - name: Business Rule Validation
        id: rules
        run: |
          echo "=== DEALERSCOPE BUSINESS RULE AUDIT ==="
          FAILED=0

          # 1. Bid ceiling check — canonical constants may live outside score.py.
          if grep -RIn "PREMIUM_BID_CEILING_PCT *= *0\.88\|STANDARD_BID_CEILING_PCT *= *0\.80\|bid_ceiling_pct_for_tier" backend/business_rules backend/ingest --include="*.py" | grep -q .; then
            echo "✅ Bid ceiling constants/gates present"
          else
            echo "❌ FAIL: Bid ceiling missing from score.py"
            FAILED=1
          fi

          # 2. Standard year cutoff (must be 10yr — Standard lane allows up to 10yr old vehicles)
          if grep -RIn "STANDARD_VEHICLE_MAX_AGE_YEARS *= *10\|standard_year_cutoff" backend/business_rules backend/ingest --include="*.py" | grep -q .; then
            echo "✅ Standard year cutoff correct (10yr for Standard lane)"
          else
            echo "❌ FAIL: Standard year cutoff missing or wrong — should be current_year - 10"
            FAILED=1
          fi

          # 3. Standard mileage (100k allowed for Standard lane per tier strategy)
          if grep -n "100000\|100_000" backend/ingest/score.py | grep -q .; then
            echo "✅ Standard mileage cap present (100k for Standard lane)"
          else
            echo "❌ FAIL: Standard lane mileage cap missing"
            FAILED=1
          fi

          # 4. Rust state filter present
          if grep -rn "HIGH_RUST_STATES" backend/ webapp/ --include="*.py" | grep -q ":"; then
            echo "✅ Rust state filter present in backend"
          else
            echo "❌ FAIL: Rust state filter missing from backend"
            FAILED=1
          fi

          # 5. Zero bid protection
          if grep -n "zero.*bid\|bid.*zero\|bid.*<= 0\|bid == 0\|not bid" backend/ingest/score.py | head -1 | grep -q .; then
            echo "✅ Zero bid protection present"
          else
            echo "⚠️ WARNING: Zero bid protection may be missing in score.py"
          fi

          # 6. No hardcoded secrets
          if grep -rn "apify_api_[A-Za-z0-9]\{20,\}\|sk-proj-[A-Za-z0-9]\|sk-ant-[A-Za-z0-9]\|ntn_[A-Za-z0-9]" \
            src/ backend/ webapp/ apify/ \
            --include="*.py" --include="*.ts" --include="*.tsx" --include="*.js" 2>/dev/null \
            | grep -v "test\|spec\|\.md\|#\|//"; then
            echo "❌ FAIL: Hardcoded API key found in source"
            FAILED=1
          else
            echo "✅ No hardcoded secrets"
          fi

          # 7. user_id filter in outcomes summary
          if grep -A 10 "get_outcomes_summary\|outcomes_summary" webapp/routers/outcomes.py 2>/dev/null | grep -q "user_id"; then
            echo "✅ outcomes summary filters by user_id"
          else
            echo "❌ FAIL: outcomes summary missing user_id filter — data leak!"
            FAILED=1
          fi

          # 8. No unapproved localhost in active frontend runtime surfaces
          if grep -RIn "localhost" src/services src/components src/hooks src/utils src/config \
            --include="*.ts" --include="*.tsx" 2>/dev/null \
            | grep -v "\.bak:" \
            | grep -v "urlSecurity\.ts:" \
            | grep -v "inputSanitizer\.ts:" \
            | grep -v "system-tester\.ts:" \
            | grep -v "useWebSocket\.ts:"; then
            echo "❌ FAIL: unapproved localhost found in active frontend runtime surfaces"
            FAILED=1
          else
            echo "✅ No unapproved localhost in active frontend runtime surfaces"
          fi

          echo ""
          echo "=== AUDIT COMPLETE ==="
          exit $FAILED

      - name: AI Code Review (Cursor)
        if: github.event_name == 'pull_request'
        env:
          OPENROUTER_KEY: ${{ secrets.OPENROUTER_KEY }}
        run: |
          # Get changed files
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          DIFF=$(git diff "$BASE_SHA".."$HEAD_SHA" -- '*.py' '*.ts' '*.tsx' '*.js' '*.sql' | head -c 60000)

          if [ -z "$DIFF" ]; then
            echo "No code changes to review."
            exit 0
          fi

          PAYLOAD=$(jq -n --arg diff "$DIFF" '{
            "model": "deepseek/deepseek-v3.2",
            "messages": [
              {"role": "system", "content": "You are a senior code reviewer for DealerScope, a vehicle arbitrage platform. Review the diff and flag: 1) Auth/security issues, 2) Business rule violations (Premium lane: max age 4yr, max mileage 50k, bid ceiling 0.88; Standard lane: max age 10yr, max mileage 100k plus mileage-per-year constraint, bid ceiling 0.80; rust state filter; min margin $1500/$2500), 3) Silent failures, 4) Data integrity issues. Be concise and actionable."},
              {"role": "user", "content": $diff}
            ]
          }')

          RESPONSE=$(curl -s -X POST https://openrouter.ai/api/v1/chat/completions \
            -H "Authorization: Bearer $OPENROUTER_KEY" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          REVIEW=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // "No review returned"')
          echo "## 🤖 Cursor AI Review" >> $GITHUB_STEP_SUMMARY
          echo "$REVIEW" >> $GITHUB_STEP_SUMMARY
          echo "$REVIEW"

      - name: Deep Audit (Gemini — scheduled runs only)
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        env:
          GEMINI_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_KEY: ${{ secrets.OPENROUTER_KEY }}
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: "-1003672399222"
          GEMINI_AUDIT_MAX_ATTEMPTS: "3"
          GEMINI_AUDIT_RETRY_DELAY_SECONDS: "60"
          GEMINI_OPENROUTER_MODEL: "google/gemini-2.5-flash"
        run: |
          python3 << 'PYEOF'
          import datetime, html, json, os, pathlib, re, ssl, time, urllib.error, urllib.request

          GEMINI_KEY = os.environ["GEMINI_KEY"]
          OPENROUTER_KEY = os.environ.get("OPENROUTER_KEY", "")
          BOT_TOKEN = os.environ.get("BOT_TOKEN", "")
          CHAT_ID = os.environ.get("CHAT_ID", "")
          MAX_ATTEMPTS = int(os.environ.get("GEMINI_AUDIT_MAX_ATTEMPTS", "3"))
          RETRY_DELAY_SECONDS = int(os.environ.get("GEMINI_AUDIT_RETRY_DELAY_SECONDS", "60"))
          OPENROUTER_MODEL = os.environ.get("GEMINI_OPENROUTER_MODEL", "google/gemini-2.5-flash")
          ctx = ssl.create_default_context()

          # Read key files for audit
          files_to_audit = [
            "backend/ingest/score.py",
            "webapp/routers/ingest.py",
            "webapp/routers/outcomes.py",
            "webapp/routers/rover.py",
          ]

          code_bundle = ""
          for filepath in files_to_audit:
            try:
              with open(filepath) as f:
                content = f.read()[:15000]
              code_bundle += f"\n\n### FILE: {filepath}\n{content}"
            except FileNotFoundError:
              pass

          bid_ceiling_proof = []
          business_rule_proof = []
          try:
            from backend.ingest.score import CURRENT_YEAR, score_deal
            proof_cases = [
              ("premium_over_88", dict(year=CURRENT_YEAR - 1, mileage=20000, bid=9000, mmr_ca=10000, state="CA", make="Toyota", model="RAV4", title_status="clean", photos=["x"])),
              ("standard_over_80", dict(year=CURRENT_YEAR - 5, mileage=60000, bid=8100, mmr_ca=10000, state="CA", make="Toyota", model="Camry", title_status="clean", photos=["x"])),
            ]
            for name, kwargs in proof_cases:
              result = score_deal(**kwargs)
              passed = (
                result.get("ceiling_pass") is False
                and result.get("ceiling_reason") == "bid_ceiling_exceeded"
                and result.get("investment_grade") == "Rejected"
                and float(result.get("dos_score", 999)) == 0.0
              )
              bid_ceiling_proof.append({
                "case": name,
                "passed": passed,
                "bid_ceiling_pct": result.get("bid_ceiling_pct"),
                "max_bid": result.get("max_bid"),
                "ceiling_pass": result.get("ceiling_pass"),
                "ceiling_reason": result.get("ceiling_reason"),
                "investment_grade": result.get("investment_grade"),
                "dos_score": result.get("dos_score"),
              })
            business_rule_cases = [
              ("rust_state_oh", dict(year=CURRENT_YEAR - 3, mileage=30000, bid=5000, mmr_ca=12000, state="OH", make="Toyota", model="Camry", title_status="clean", photos=["x"])),
              ("standard_miles_per_year_over_18000", dict(year=CURRENT_YEAR - 5, mileage=100000, bid=5000, mmr_ca=12000, state="CA", make="Toyota", model="Camry", title_status="clean", photos=["x"])),
            ]
            for name, kwargs in business_rule_cases:
              result = score_deal(**kwargs)
              if name == "rust_state_oh":
                passed = (
                  result.get("investment_grade") == "Rejected"
                  and float(result.get("dos_score", 999)) == 0.0
                  and result.get("vehicle_tier") == "rejected"
                  and result.get("ceiling_reason") == "high_rust_state_rejected"
                  and "rust_state_source" in (result.get("risk_flags") or [])
                )
              else:
                passed = (
                  result.get("investment_grade") == "Rejected"
                  and float(result.get("dos_score", 999)) == 0.0
                  and result.get("vehicle_tier") == "rejected"
                  and "mileage_per_year_gt_18000" in (result.get("risk_flags") or [])
                )
              business_rule_proof.append({
                "case": name,
                "passed": passed,
                "investment_grade": result.get("investment_grade"),
                "dos_score": result.get("dos_score"),
                "vehicle_tier": result.get("vehicle_tier"),
                "ceiling_pass": result.get("ceiling_pass"),
                "ceiling_reason": result.get("ceiling_reason"),
                "risk_flags": result.get("risk_flags"),
              })
          except Exception as e:
            bid_ceiling_proof.append({"error": repr(e)})
            business_rule_proof.append({"error": repr(e)})

          bid_ceiling_gate_passed = (
            len(bid_ceiling_proof) == 2
            and all(row.get("passed") is True for row in bid_ceiling_proof)
          )
          business_rule_gate_passed = (
            len(business_rule_proof) == 2
            and all(row.get("passed") is True for row in business_rule_proof)
          )
          audit_evidence_proof = {}
          try:
            from backend.business_rules.gates import _coerce_float as _gates_coerce_float
            from backend.ingest.score import _auction_velocity_score, _coerce_float, _round_price_basis
            from backend.rover.heuristic_scorer import _coerce_float as _rover_coerce_float
            expired = (datetime.datetime.now(datetime.timezone.utc) - datetime.timedelta(hours=2)).isoformat()
            long_dated = (datetime.datetime.now(datetime.timezone.utc) + datetime.timedelta(days=8)).isoformat()
            audit_evidence_proof["expired_auction_velocity_non_urgent"] = (
              _auction_velocity_score({"auction_end": expired}) == 25.0
            )
            audit_evidence_proof["expired_auction_velocity_matches_nonurgent_floor"] = (
              _auction_velocity_score({"auction_end": expired}) == 25.0
              and _auction_velocity_score({"auction_end": long_dated}) == 25.0
              and _auction_velocity_score({
                "auction_end": (datetime.datetime.now(datetime.timezone.utc) + datetime.timedelta(hours=4)).isoformat()
              }) == 100.0
              and _auction_velocity_score({
                "auction_end": (datetime.datetime.now(datetime.timezone.utc) + datetime.timedelta(days=2)).isoformat()
              }) == 65.0
            )
            audit_evidence_proof["round_price_basis_complete"] = (_round_price_basis(12345) == 12000)
            audit_evidence_proof["coerce_float_rejects_invalid_and_nonfinite"] = (
              _coerce_float("not-a-number") is None
              and _coerce_float("nan") is None
              and _coerce_float("inf") is None
            )
            audit_evidence_proof["coerce_float_normalizes_formatted_numeric_strings"] = (
              _coerce_float("12,345") == 12345.0
              and _coerce_float(" $12,345.67 ") == 12345.67
              and _gates_coerce_float("12,345") == 12345.0
              and _gates_coerce_float(" $12,345.67 ") == 12345.67
              and _rover_coerce_float("12,345") == 12345.0
              and _rover_coerce_float(" $12,345.67 ") == 12345.67
            )
          except Exception as proof_error:
            audit_evidence_proof["score_proof_error"] = repr(proof_error)

          try:
            ingest_source = pathlib.Path("webapp/routers/ingest.py").read_text(encoding="utf-8")
            outcomes_source = pathlib.Path("webapp/routers/outcomes.py").read_text(encoding="utf-8")
            score_source = pathlib.Path("backend/ingest/score.py").read_text(encoding="utf-8")
            rover_source = pathlib.Path("webapp/routers/rover.py").read_text(encoding="utf-8")
            ingest_tests = pathlib.Path("tests/test_ingest_webhook_security.py").read_text(encoding="utf-8")
            outcomes_tests = pathlib.Path("tests/test_outcomes_operational_loop.py").read_text(encoding="utf-8")
            score_tests = pathlib.Path("tests/test_ingest_scoring.py").read_text(encoding="utf-8")
            rover_tests = pathlib.Path("tests/test_rover_decay.py").read_text(encoding="utf-8")
            migrations_text = "\n".join(
              path.read_text(encoding="utf-8")
              for path in pathlib.Path("supabase/migrations").glob("*.sql")
            )
            audit_evidence_proof["direct_pg_webhook_insert_parameterized"] = (
              "def _insert_webhook_log_direct_pg" in ingest_source
              and "values (%s, %s, %s, %s, %s, %s, %s)" in ingest_source
              and "psycopg2_extras.Json" in ingest_source
            )
            audit_evidence_proof["outcomes_system_opportunity_non_operator_rejected"] = (
              "System opportunity ownership not configured" in outcomes_source
              and "raise HTTPException(status_code=403" in outcomes_source
              and "if _is_operator_user(require_user_id)" in outcomes_source
              and "if not _is_operator_user(user_id)" in outcomes_source
            )
            audit_evidence_proof["operator_privileged_outcome_write_documented"] = (
              "DEALERSCOPE_OPERATOR_USER_ID is an explicit privileged operator account" in outcomes_source
              and "may record outcomes across user-owned and system-owned opportunities" in outcomes_source
              and "may record bid outcomes across user-owned and system-owned opportunities" in outcomes_source
            )
            audit_evidence_proof["operator_privilege_uses_authenticated_user_id"] = (
              "return user.user.id" in outcomes_source
              and "opportunity = _fetch_opportunity(opportunity_id, require_user_id=user_id)" in outcomes_source
              and "payload: OutcomePatchPayload" in outcomes_source
              and "user_id:" not in outcomes_source.split("class OutcomePatchPayload", 1)[1].split("def ", 1)[0]
              and "test_foreign_owned_opportunity_rejects_bid_outcome" in outcomes_tests
            )
            audit_evidence_proof["operator_override_is_logged"] = (
              "operator override opp=%s operator=%s owner=%s" in outcomes_source
              and "test_operator_bid_outcome_override_is_logged" in outcomes_tests
            )
            audit_evidence_proof["outcome_update_zero_row_conflict"] = (
              "Opportunity outcome mirror update matched zero rows" in outcomes_source
              and "raise HTTPException(status_code=409" in outcomes_source
            )
            audit_evidence_proof["dealer_sales_errors_logged_and_http_500"] = (
              "[OUTCOMES] dealer_sales persistence failed" in outcomes_source
              and 'HTTPException(status_code=500, detail="Failed to persist outcome evidence")' in outcomes_source
            )
            audit_evidence_proof["dealer_sales_empty_upsert_fails_closed"] = (
              "dealer_sales upsert returned zero rows" in outcomes_source
              and "test_sale_outcome_fails_closed_when_dealer_sales_upsert_returns_zero_rows" in outcomes_tests
            )
            audit_evidence_proof["dealer_sales_payload_requires_essential_fields"] = (
              "dealer_sales payload missing required columns" in outcomes_source
              and "Outcome evidence payload missing required fields" in outcomes_source
              and "test_dealer_sales_payload_rejects_empty_or_missing_required_fields" in outcomes_tests
            )
            audit_evidence_proof["won_bid_requires_positive_purchase_price"] = (
              "purchase_price is required when won=true" in outcomes_source
              and "purchase_price must be greater than 0 when won=true" in outcomes_source
              and "test_won_bid_outcome_requires_purchase_price_before_persistence" in outcomes_tests
              and "test_won_bid_outcome_rejects_zero_purchase_price_before_persistence" in outcomes_tests
            )
            audit_evidence_proof["won_outcomes_require_positive_current_bid"] = (
              "current_bid is required to calculate outcome metrics" in outcomes_source
              and "test_won_bid_outcome_requires_positive_current_bid_before_persistence" in outcomes_tests
              and "test_sale_outcome_requires_positive_current_bid_before_persistence" in outcomes_tests
            )
            audit_evidence_proof["premium_missing_photos_are_risk_flag_not_hard_rejection_policy"] = (
              'flags.append("missing_photos")' in score_source
              and "prevents benign flags like 'missing_photos' from unconditionally" in score_source
              and "test_premium_missing_photos_are_risk_flag_not_hard_rejection_policy" in score_tests
            )
            audit_evidence_proof["score_deal_wrapper_enforces_premium_age_and_mileage"] = (
              "vehicle_tier = determine_vehicle_tier(year, mileage)" in score_source
              and 'if vehicle_tier == "rejected":' in score_source
              and 'selected_dos = dos_premium if vehicle_tier == "premium" else dos_standard' in score_source
              and "test_determine_vehicle_tier_enforces_age_and_mileage_hard_stops" in score_tests
            )
            audit_evidence_proof["bid_outcome_caller_sets_outcome_recorded_at"] = (
              "def _mirror_bid_outcome_to_dealer_sales" in outcomes_source
              and "async def create_bid_outcome" in outcomes_source
              and '"outcome_recorded_at": datetime.now(timezone.utc).isoformat()' in outcomes_source
              and "test_bid_outcome_persists_queryable_dealer_sales_and_updates_opportunity" in outcomes_tests
            )
            audit_evidence_proof["legacy_mirror_is_realized_sale_only"] = (
              "def _legacy_mirror_to_dealer_sales" in outcomes_source
              and '"type": "realized_sale_outcome"' in outcomes_source
              and 'async def create_outcome' in outcomes_source
              and "test_sale_outcome_returns_explicit_persistence_success" in outcomes_tests
            )
            audit_evidence_proof["outcomes_non_sale_price_zero"] = (
              '"sale_price": sold_price if sold_price is not None else 0' in outcomes_source
              and 'sale_price = normalized.purchase_price if normalized.outcome == "won" else 0' in outcomes_source
              and 'assert dealer_payload["sale_price"] == 0' in outcomes_tests
              and 'assert dealer_payload["sold_price"] is None' in outcomes_tests
            )
            audit_evidence_proof["duplicate_missing_listing_url_uses_canonical_id"] = (
              "test_duplicate_check_uses_canonical_id_when_listing_url_missing" in ingest_tests
              and '.eq("canonical_id", canonical_id)' in ingest_source
              and "if not canonical_id:" in ingest_source
            )
            audit_evidence_proof["duplicate_listing_url_also_checks_canonical_id"] = (
              "test_duplicate_check_updates_canonical_sources_when_listing_url_matches" in ingest_tests
              and "listing_match = None" in ingest_source
              and "listing_match = existing.data[0]" in ingest_source
              and '.eq("listing_url", listing_url)' in ingest_source
              and '.eq("canonical_id", canonical_id)' in ingest_source
            )
            audit_evidence_proof["webhook_log_direct_pg_fallback_is_durable_and_labelled"] = (
              "test_insert_webhook_log_falls_back_to_direct_pg_and_marks_audit_state" in ingest_tests
              and "webhook_log_insert_direct_pg" in ingest_source
              and "record_audit_fallback(audit_state, fallback_label)" in ingest_source
              and "format_audit_failure(" in ingest_source
            )
            audit_evidence_proof["high_demand_model_list_is_curated_scorer_policy"] = (
              "HIGH_DEMAND_MODELS = {" in score_source
              and "def _model_score_v2" in score_source
              and "return 0.65" in score_source
            )
            audit_evidence_proof["rust_state_new_vehicle_exception_and_source_risk_policy"] = (
              "test_score_deal_allows_high_rust_state_new_vehicle_exception" in score_tests
              and 'assert "rust_state_source" in result["risk_flags"]' in score_tests
              and "is_high_rust_state_rejected" in score_source
            )
            audit_evidence_proof["score_uses_dynamic_current_year_for_age"] = (
              "age = max(1, _current_year() - year)" in score_source
              and score_source.count("age = max(1, _current_year() - year)") >= 2
              and "CURRENT_YEAR = _current_year()" in score_source
            )
            audit_evidence_proof["score_deal_wrapper_selects_vehicle_tier"] = (
              "vehicle_tier = determine_vehicle_tier(year, mileage)" in score_source
              and 'selected_dos = dos_premium if vehicle_tier == "premium" else dos_standard' in score_source
              and '"designated_lane": vehicle_tier' in score_source
            )
            audit_evidence_proof["rover_redis_affinity_nonfatal_and_debug_visible"] = (
              "Redis affinity init failed (non-fatal)" in rover_source
              and "Redis not configured" in rover_source
              and '"redis available": "yes" if _redis_client else "no"' in rover_source
              and "Affinity fetch failed (non-fatal)" in rover_source
              and "Redis affinity update failed (non-fatal)" in rover_source
            )
            audit_evidence_proof["critical_audit_write_errors_handled_upstream"] = (
              "except CriticalAuditWriteError as e" in ingest_source
              and "Critical ingest audit write failed" in ingest_source
              and "[INGEST_AUDIT]" in ingest_source
            )
            audit_evidence_proof["canonical_duplicate_unique_index_present"] = (
              "idx_opportunities_canonical_unique" in migrations_text
              and "ON opportunities(canonical_id) WHERE is_duplicate = FALSE" in migrations_text
            )
            audit_evidence_proof["rover_numeric_defaults_are_serialization_fallbacks"] = (
              "def _serialize_recommendation" in rover_source
              and "_coerce_number(row.get(\"dos_score\", row.get(\"score\")), 0.0)" in rover_source
              and "_coerce_number(row.get(\"current_bid\", row.get(\"buy_now_price\")), 0.0)" in rover_source
              and "test_score_item_accepts_string_numeric_fields" in rover_tests
            )
            audit_evidence_proof["rover_heuristic_import_debug_visible"] = (
              "from backend.rover.heuristic_scorer import build_preference_vector, score_item, rank_opportunities" in rover_source
              and '"heuristic_scorer import": heuristic_status' in rover_source
              and "test_rover_debug_endpoint_reports_runtime_status" in rover_tests
            )
          except Exception as proof_error:
            audit_evidence_proof["source_proof_error"] = repr(proof_error)
          # Exact false-positive titles suppressed only when deterministic proof passes:
          # Missing Rust State Rejection
          # Mileage-per-year Rejection Bypass
          # Incomplete Bid Ceiling Enforcement
          # Insecure Direct Object Reference
          # SQL Injection Vulnerability
          # Potential for Race Condition

          def suppress_deterministically_false_findings(findings: str) -> str:
            """Remove findings contradicted by deterministic local proof.

            Model instructions are not a safety boundary. If the local score_deal()
            proof demonstrates hard bid-ceiling rejection, a model line claiming
            Missing Bid Ceiling Rejections is stale or hallucinated and must not
            be forwarded as a critical alert.
            """
            if not findings or not (bid_ceiling_gate_passed or business_rule_gate_passed):
              return findings
            kept = []
            suppressed = []
            suppressing_false_positive_block = False
            for line in findings.splitlines():
              normalized = line.lower()
              stripped = normalized.strip()
              starts_new_finding = bool(re.match(r"^\s*(?:\d+\.|[-*])\s+.*\|", line))
              starts_pipe_finding = stripped.startswith(("critical |", "high |"))
              starts_markdown_finding = stripped.startswith(("**critical", "**high", "###"))
              if suppressing_false_positive_block:
                if not line.strip():
                  suppressing_false_positive_block = False
                  continue
