name: Configure BidSpotter Apify Schedule

on:
  workflow_dispatch:
    inputs:
      schedule_cron:
        description: "Apify UTC cron for BidSpotter cadence"
        required: false
        default: "45 10,22 * * *"

jobs:
  configure-bidspotter-apify-schedule:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
      FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
      ACTOR_ID: "5Eu3hfCcBBdzp6I1u"
      SCHEDULE_NAME: "ds-bidspotter-12hr-apify-native"
      DEFAULT_SCHEDULE_CRON: "45 10,22 * * *"
      SCHEDULE_CRON: ${{ inputs.schedule_cron || '45 10,22 * * *' }}
    steps:
      - name: Configure actor secret env and Apify schedule
        run: |
          python3 - <<'PY'
          import json
          import os
          import sys
          import urllib.error
          import urllib.parse
          import urllib.request
          from datetime import datetime, timezone

          APIFY_TOKEN = os.environ.get("APIFY_TOKEN", "").strip()
          FIRECRAWL_API_KEY = os.environ.get("FIRECRAWL_API_KEY", "").strip()
          ACTOR_ID = os.environ["ACTOR_ID"]
          SCHEDULE_NAME = os.environ["SCHEDULE_NAME"]
          DEFAULT_SCHEDULE_CRON = os.environ["DEFAULT_SCHEDULE_CRON"]
          SCHEDULE_CRON = (os.environ.get("SCHEDULE_CRON") or DEFAULT_SCHEDULE_CRON).strip()
          CURRENT_YEAR = datetime.now(timezone.utc).year

          if not APIFY_TOKEN:
              raise SystemExit("APIFY_TOKEN GitHub secret is required")
          if not FIRECRAWL_API_KEY:
              raise SystemExit("FIRECRAWL_API_KEY GitHub secret is required")

          def request(method, path, body=None):
              url = f"https://api.apify.com/v2{path}"
              data = None if body is None else json.dumps(body).encode("utf-8")
              req = urllib.request.Request(
                  url,
                  data=data,
                  method=method,
                  headers={
                      "Authorization": f"Bearer {APIFY_TOKEN}",
                      "Content-Type": "application/json",
                  },
              )
              try:
                  with urllib.request.urlopen(req, timeout=30) as response:
                      return json.load(response).get("data")
              except urllib.error.HTTPError as exc:
                  detail = exc.read().decode("utf-8", errors="replace")
                  raise RuntimeError(f"{method} {path} failed: HTTP {exc.code}: {detail}") from exc

          def paged_items(path):
              data = request("GET", path)
              if isinstance(data, dict) and "items" in data:
                  return data["items"]
              return []

          versions = paged_items(f"/actors/{ACTOR_ID}/versions?limit=100")
          if not versions:
              raise SystemExit(f"No versions found for actor {ACTOR_ID}")

          configured_versions = []
          for version in versions:
              version_number = version["versionNumber"]
              env_path = (
                  f"/actors/{ACTOR_ID}/versions/"
                  f"{urllib.parse.quote(version_number, safe='')}/env-vars"
              )
              env_vars = paged_items(env_path)
              env_payload = {
                  "name": "FIRECRAWL_API_KEY",
                  "value": FIRECRAWL_API_KEY,
                  "isSecret": True,
              }
              if any(item.get("name") == "FIRECRAWL_API_KEY" for item in env_vars):
                  request("PUT", f"{env_path}/FIRECRAWL_API_KEY", env_payload)
              else:
                  request("POST", env_path, env_payload)
              configured_versions.append(version_number)

          schedule_body = {
              "name": SCHEDULE_NAME,
              "title": "BidSpotter 12h Apify-native source run",
              "description": (
                  "DealerScope BidSpotter cadence. Firecrawl is provided by "
                  "the actor secret environment variable, not schedule input."
              ),
              "isEnabled": True,
              "isExclusive": True,
              "cronExpression": SCHEDULE_CRON,
              "timezone": "UTC",
              "actions": [
                  {
                      "type": "RUN_ACTOR",
                      "actorId": ACTOR_ID,
                      "runInput": {
                          "body": json.dumps(
                              {
                                  "maxCatalogues": 2,
                                  "maxPages": 1,
                                  "minYear": CURRENT_YEAR - 4,
                                  "maxMileage": 50000,
                              },
                              sort_keys=True,
                          ),
                          "contentType": "application/json; charset=utf-8",
                      },
                      "runOptions": {
                          "build": "latest",
                          "timeoutSecs": 3600,
                          "memoryMbytes": 1024,
                      },
                  }
              ],
          }

          schedules = paged_items("/schedules?limit=1000")
          existing = next((item for item in schedules if item.get("name") == SCHEDULE_NAME), None)
          if existing:
              schedule = request("PUT", f"/schedules/{existing['id']}", schedule_body)
              action = "updated"
          else:
              schedule = request("POST", "/schedules", schedule_body)
              action = "created"

          print(json.dumps({
              "actor_id": ACTOR_ID,
              "configured_secret_env_versions": configured_versions,
              "schedule_action": action,
              "schedule_id": schedule.get("id"),
              "schedule_name": schedule.get("name"),
              "cron": schedule.get("cronExpression"),
              "timezone": schedule.get("timezone"),
              "is_enabled": schedule.get("isEnabled"),
              "next_run_at": schedule.get("nextRunAt"),
          }, indent=2, sort_keys=True))
          PY
