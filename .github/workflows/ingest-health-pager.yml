name: Ingest Health Pager

on:
  workflow_dispatch:
    inputs:
      notify_enabled:
        description: 'Enable pager notification path for this run'
        required: false
        default: 'true'
      notify_dry_run:
        description: 'Use dry-run mode for this run'
        required: false
        default: 'true'
      force_notify:
        description: 'Force a controlled pager proof even if health is green'
        required: false
        default: 'true'
      actors:
        description: 'Space-delimited actor list for the health check'
        required: false
        default: 'ds-govdeals ds-publicsurplus'
  schedule:
    - cron: '*/15 * * * *'

concurrency:
  group: ingest-health-pager
  cancel-in-progress: false

jobs:
  ingest-health:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
      SUPABASE_DATABASE_URL: ${{ secrets.SUPABASE_DATABASE_URL }}
      SUPABASE_DIRECT_DB_URL: ${{ secrets.SUPABASE_DIRECT_DB_URL }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      INGEST_HEALTH_NOTIFY_ENABLED: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.notify_enabled || vars.INGEST_HEALTH_NOTIFY_ENABLED || 'false' }}
      INGEST_HEALTH_NOTIFY_DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.notify_dry_run || vars.INGEST_HEALTH_NOTIFY_DRY_RUN || 'true' }}
      INGEST_HEALTH_FORCE_NOTIFY: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.force_notify || 'false' }}
      INGEST_HEALTH_CONTEXT: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      INGEST_HEALTH_ACTORS: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.actors || 'ds-govdeals ds-publicsurplus' }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run ingest health pager
        run: |
          # shellcheck disable=SC2086
          scripts/page_recent_ingest_health.sh \
            --actors ${INGEST_HEALTH_ACTORS}
