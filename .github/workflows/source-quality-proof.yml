name: DealerScope Source Quality Proof

on:
  workflow_dispatch:
    inputs:
      source:
        description: Source/source_site to inspect
        required: true
        default: proxibid
      limit:
        description: Recent-row sample size
        required: false
        default: "300"

permissions:
  contents: read

jobs:
  proof:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch sanitized source quality summary
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          SOURCE_NAME: ${{ inputs.source }}
          SAMPLE_LIMIT: ${{ inputs.limit }}
        run: |
          set -euo pipefail
          python3 <<'PY'
          import json
          import os
          import urllib.parse
          import urllib.request

          PROXIBID_ACTOR_ID = "bxhncvtHEP712WX2e"

          supabase_url = os.environ["SUPABASE_URL"].rstrip("/")
          service_key = os.environ["SUPABASE_SERVICE_ROLE_KEY"]
          source = (os.environ.get("SOURCE_NAME") or "proxibid").strip().lower()
          try:
              limit = max(1, min(int(os.environ.get("SAMPLE_LIMIT") or "300"), 1000))
          except ValueError:
              limit = 300

          def json_get(url, headers=None):
              req = urllib.request.Request(url, headers=headers or {})
              with urllib.request.urlopen(req, timeout=30) as resp:
                  return json.loads(resp.read().decode())

          def rest_get(path):
              return json_get(
                  f"{supabase_url}{path}",
                  headers={"apikey": service_key, "Authorization": f"Bearer {service_key}"},
              )

          def apify_get(path, token):
              return json_get(
                  f"https://api.apify.com/v2{path}",
                  headers={"Authorization": f"Bearer {token}"},
              )

          columns_rows = rest_get(
              "/rest/v1/rpc/get_table_columns"
              if False else
              "/rest/v1/opportunities?select=*&limit=1"
          )
          available_columns = set(columns_rows[0].keys()) if columns_rows else set()
          wanted = [
              "id",
              "created_at",
              "source",
              "source_site",
              "mileage",
              "vin",
              "pricing_maturity",
              "mmr_confidence_proxy",
              "condition_grade",
              "condition",
              "dos_score",
              "score",
          ]
          selected_columns = [col for col in wanted if col in available_columns]
          select = ",".join(selected_columns or ["id"])
          source_filters = []
          if "source" in available_columns:
              source_filters.append(f"source.eq.{source}")
          if "source_site" in available_columns:
              source_filters.append(f"source_site.eq.{source}")
          if not source_filters:
              raise SystemExit("opportunities has neither source nor source_site column")
          order_column = "created_at" if "created_at" in available_columns else selected_columns[0]
          query = urllib.parse.urlencode({
              "select": select,
              "or": f"({','.join(source_filters)})",
              "order": f"{order_column}.desc",
              "limit": str(limit),
          })
          rows = rest_get(f"/rest/v1/opportunities?{query}")

          def has_mileage(row):
              try:
                  value = row.get("mileage")
                  return value not in (None, "") and float(value) > 0
              except (TypeError, ValueError):
                  return False

          def has_vin(row):
              value = str(row.get("vin") or "").strip().upper()
              return len(value) == 17 and value.isalnum() and not any(ch in value for ch in "IOQ")

          def has_condition(row):
              value = str(row.get("condition_grade") or row.get("condition") or "").strip().lower()
              return bool(value) and value not in {"unknown", "poor"}

          def has_confidence(row):
              return row.get("mmr_confidence_proxy") is not None

          def count_by(field):
              out = {}
              for row in rows:
                  value = str(row.get(field) or "unknown")
                  out[value] = out.get(value, 0) + 1
              return dict(sorted(out.items()))

          n = len(rows)
          summary = {
              "source": source,
              "accepted_opportunity_quality": True,
              "sample_count": n,
              "mileage_present": sum(has_mileage(row) for row in rows),
              "vin_present": sum(has_vin(row) for row in rows),
              "verified_condition_present": sum(has_condition(row) for row in rows),
              "confidence_present": sum(has_confidence(row) for row in rows),
              "pricing_maturity_counts": count_by("pricing_maturity"),
              "latest_created_at": rows[0].get("created_at") if rows else None,
              "oldest_created_at_in_sample": rows[-1].get("created_at") if rows else None,
          }
          for key in ["mileage_present", "vin_present", "verified_condition_present", "confidence_present"]:
              summary[key + "_pct"] = round((summary[key] / n) * 100, 1) if n else None

          scraper_enrichment = None
          apify_token = os.environ.get("APIFY_TOKEN")
          if source == "proxibid" and apify_token:
              runs = apify_get(
                  f"/acts/{PROXIBID_ACTOR_ID}/runs?limit=5&status=SUCCEEDED&desc=true",
                  apify_token,
              ).get("data", {}).get("items", [])
              for run in runs:
                  dataset_id = run.get("defaultDatasetId")
                  if not dataset_id:
                      continue
                  items = apify_get(
                      f"/datasets/{dataset_id}/items?clean=true&limit=1000",
                      apify_token,
                  )
                  proof_rows = [item for item in items if item.get("record_type") == "source_quality_proof" and item.get("source_site") == source]
                  if proof_rows:
                      scraper_enrichment = proof_rows[-1]
                      scraper_enrichment["actor_run_id"] = run.get("id")
                      scraper_enrichment["dataset_id"] = dataset_id
                      scraper_enrichment["finished_at"] = run.get("finishedAt")
                      break
          summary["scraper_enrichment_attempt_quality"] = scraper_enrichment or {
              "available": False,
              "reason": "no_recent_source_quality_proof_record",
          }

          print(json.dumps(summary, indent=2, sort_keys=True))
          PY
