name: DealerScope Supabase Apply Migration

on:
  workflow_dispatch:
    inputs:
      migration_file:
        description: "Migration SQL file under supabase/migrations/"
        required: true
        default: "20260603_post_close_outcome_requests.sql"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  apply-migration:
    runs-on: ubuntu-latest
    steps:
      - name: Set Git default branch for quiet checkout
        run: git config --global init.defaultBranch main

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Postgres client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Apply allowlisted Supabase migration
        env:
          MIGRATION_FILE: ${{ inputs.migration_file }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_DB_POOLER_HOST: ${{ secrets.SUPABASE_DB_POOLER_HOST }}
          SUPABASE_DB_POOLER_PORT: ${{ secrets.SUPABASE_DB_POOLER_PORT }}
        run: |
          set -euo pipefail

          if [ -z "${SUPABASE_DB_PASSWORD}" ] || [ -z "${SUPABASE_PROJECT_ID}" ] || [ -z "${SUPABASE_DB_POOLER_HOST}" ]; then
            echo "Missing Supabase DB secret inputs." >&2
            exit 2
          fi

          eval "$(python3 - <<'PY'
          import os
          import re
          import shlex
          from pathlib import Path
          from urllib.parse import urlparse

          PROJECT_REF_RE = re.compile(r"^[a-z0-9][a-z0-9-]{2,63}$")
          POOLER_HOST_RE = re.compile(r"^[A-Za-z0-9.-]+\.pooler\.supabase\.com$")
          PORT_RE = re.compile(r"^[0-9]{1,5}$")

          repo_root = Path.cwd().resolve()
          allowed_root = (repo_root / "supabase" / "migrations").resolve()
          MIGRATION_FILE = os.environ.get("MIGRATION_FILE", "").strip()
          input_path = Path(MIGRATION_FILE)
          candidate_path = input_path if len(input_path.parts) > 1 else Path("supabase/migrations") / input_path
          migration_path = (repo_root / candidate_path).resolve()
          if migration_path.suffix != ".sql":
              raise SystemExit("Migration file must be a .sql file.")
          try:
              migration_path.relative_to(allowed_root)
          except ValueError:
              raise SystemExit("Migration path traversal is not allowed.")
          if not migration_path.is_file():
              raise SystemExit("Migration file was not found.")

          supabase_url = os.environ.get("SUPABASE_URL", "").strip()
          parsed = urlparse(supabase_url)
          match = re.search(r"^([a-z0-9][a-z0-9-]{2,63})\.supabase\.co$", parsed.netloc)
          project_id = match.group(1) if match else os.environ["SUPABASE_PROJECT_ID"].strip()
          if not PROJECT_REF_RE.fullmatch(project_id):
              raise SystemExit("Invalid Supabase project reference.")
          pooler_host = os.environ.get("SUPABASE_DB_POOLER_HOST", "").strip()
          if not POOLER_HOST_RE.fullmatch(pooler_host):
              raise SystemExit("Invalid Supabase pooler host.")
          pooler_port = os.environ.get("SUPABASE_DB_POOLER_PORT", "").strip() or "5432"
          if not PORT_RE.fullmatch(pooler_port) or not (1 <= int(pooler_port) <= 65535):
              raise SystemExit("Invalid Supabase pooler port.")

          conn = f"host={pooler_host} port={pooler_port} dbname=postgres user=postgres.{project_id} sslmode=require"
          print(f"MIGRATION_PATH={shlex.quote(str(migration_path))}")
          print(f"PSQL_CONN={shlex.quote(conn)}")
          PY
          )"

          PGPASSWORD="${SUPABASE_DB_PASSWORD}" psql "${PSQL_CONN}" -v ON_ERROR_STOP=1 -f "${MIGRATION_PATH}"
