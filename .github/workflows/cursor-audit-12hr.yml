          def send_telegram_html_message(message: str) -> None:
            if not BOT_TOKEN:
              return
            tg_payload = json.dumps({"chat_id": CHAT_ID, "text": message, "parse_mode": "HTML"}).encode()
            tg_req = urllib.request.Request(
              f"https://api.telegram.org/bot{BOT_TOKEN}/sendMessage",
              data=tg_payload, headers={"Content-Type": "application/json"}, method="POST"
            )
            with urllib.request.urlopen(tg_req, context=ctx) as r:
              print("Telegram alert sent:", json.loads(r.read()).get("ok"))

          def fetch_direct_gemini_audit() -> dict:
            last_error = None
            retryable_statuses = {429, 500, 502, 503, 504}
            for attempt in range(1, MAX_ATTEMPTS + 1):
              try:
                with urllib.request.urlopen(req, context=ctx, timeout=60) as r:
                  return json.loads(r.read())
              except urllib.error.HTTPError as e:
                last_error = e
                if e.code not in retryable_statuses or attempt == MAX_ATTEMPTS:
                  break
                print(f"Gemini audit attempt {attempt}/{MAX_ATTEMPTS} got HTTP {e.code}; retrying in {RETRY_DELAY_SECONDS}s")
                time.sleep(RETRY_DELAY_SECONDS)
              except urllib.error.URLError as e:
                last_error = e
                if attempt == MAX_ATTEMPTS:
                  break
                print(f"Gemini audit attempt {attempt}/{MAX_ATTEMPTS} failed with URL error; retrying in {RETRY_DELAY_SECONDS}s: {e}")
                time.sleep(RETRY_DELAY_SECONDS)
            raise RuntimeError(f"Gemini audit unavailable after {MAX_ATTEMPTS} attempt(s): {last_error}") from last_error

          def fetch_openrouter_gemini_audit() -> dict:
            if not OPENROUTER_KEY:
              raise RuntimeError("OPENROUTER_KEY is not configured for Gemini fallback")

            openrouter_payload = json.dumps({
              "model": OPENROUTER_MODEL,
              "messages": [
                {
                  "role": "system",
                  "content": "You are a senior red-team auditor for DealerScope. Report only CRITICAL and HIGH issues. Format: SEVERITY | FILE | ISSUE | FIX.",
                },
                {"role": "user", "content": prompt},
              ],
              "temperature": 0.0,
              "max_tokens": 2000,
            }).encode()
            openrouter_req = urllib.request.Request(
              "https://openrouter.ai/api/v1/chat/completions",
              data=openrouter_payload,
              headers={
                "Authorization": f"Bearer {OPENROUTER_KEY}",
                "Content-Type": "application/json",
              },
              method="POST",
            )

            last_error = None
            retryable_statuses = {408, 429, 500, 502, 503, 504}
            for attempt in range(1, MAX_ATTEMPTS + 1):
              try:
                with urllib.request.urlopen(openrouter_req, context=ctx, timeout=60) as r:
                  data = json.loads(r.read())
                text = data.get("choices", [{}])[0].get("message", {}).get("content", "")
                if not text:
                  raise RuntimeError("OpenRouter Gemini returned no audit content")
                return {"candidates": [{"content": {"parts": [{"text": text}]}}]}
              except urllib.error.HTTPError as e:
                last_error = e
                if e.code not in retryable_statuses or attempt == MAX_ATTEMPTS:
                  break
                print(f"OpenRouter Gemini audit attempt {attempt}/{MAX_ATTEMPTS} got HTTP {e.code}; retrying in {RETRY_DELAY_SECONDS}s")
                time.sleep(RETRY_DELAY_SECONDS)
              except (urllib.error.URLError, RuntimeError) as e:
                last_error = e
                if attempt == MAX_ATTEMPTS:
                  break
                print(f"OpenRouter Gemini audit attempt {attempt}/{MAX_ATTEMPTS} failed; retrying in {RETRY_DELAY_SECONDS}s: {e}")
                time.sleep(RETRY_DELAY_SECONDS)
            raise RuntimeError(f"OpenRouter Gemini audit unavailable after {MAX_ATTEMPTS} attempt(s): {last_error}") from last_error

          def fetch_gemini_audit() -> dict:
            try:
              return fetch_direct_gemini_audit()
            except Exception as direct_error:
              print(f"Direct Gemini audit unavailable: {direct_error}; falling back to OpenRouter {OPENROUTER_MODEL}")
              try:
                return fetch_openrouter_gemini_audit()
              except Exception as fallback_error:
                raise RuntimeError(
                  "Gemini audit unavailable after direct and OpenRouter fallback: "
                  f"direct={direct_error}; fallback={fallback_error}"
                ) from fallback_error

          try:
            data = fetch_gemini_audit()
          except Exception as e:
            now = datetime.datetime.utcnow().strftime("%Y-%m-%d %H:%M UTC")
            error_message = f"Gemini audit unavailable after {MAX_ATTEMPTS} attempt(s): {e}"
            print(f"::error title=DealerScope Gemini audit degraded::{error_message}")
            summary_path = os.environ.get("GITHUB_STEP_SUMMARY")
            if summary_path:
              with open(summary_path, "a", encoding="utf-8") as summary:
                summary.write("## DealerScope Gemini audit degraded\n\n")
                summary.write(f"- Time: {now}\n")
                summary.write(f"- Status: {error_message}\n")
                summary.write("- Result: failing this workflow so a degraded red-team audit is not represented as green.\n")
            try:
              send_telegram_html_message(
                f"⚠️ <b>DealerScope 12hr Audit degraded — {now}</b>\n\n"
                f"{html.escape(error_message)[:3000]}"
              )
            except Exception as alert_error:
              print(f"::error title=DealerScope audit alert delivery failed::{alert_error}")
            raise SystemExit(1)

          raw_findings = data.get("candidates", [{}])[0].get("content", {}).get("parts", [{}])[0].get("text", "")
          findings = suppress_deterministically_false_findings(raw_findings)
          findings = suppress_unsupported_or_contradicted_findings(findings)

          print("=== GEMINI AUDIT FINDINGS ===")
          print(findings)

          # Send to Telegram if there's anything critical after deterministic suppression.
          if findings and ("CRITICAL" in findings or "HIGH" in findings) and BOT_TOKEN:
            now = datetime.datetime.utcnow().strftime("%Y-%m-%d %H:%M UTC")
            msg = f"🔍 <b>DealerScope 12hr Audit — {now}</b>\n\n<pre>{html.escape(findings)[:3000]}</pre>"
            try:
              send_telegram_html_message(msg)
            except Exception as alert_error:
              print(f"::error title=DealerScope audit alert delivery failed::{alert_error}")
              raise RuntimeError("DealerScope audit alert delivery failed: " + repr(alert_error)) from alert_error
          PYEOF
