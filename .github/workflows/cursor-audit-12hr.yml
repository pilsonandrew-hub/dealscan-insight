          Additional deterministic and source evidence is below. Do not report speculative, implied, potential, malformed, or contradicted findings. Do not report expired auction velocity as HIGH/CRITICAL when expired_auction_velocity_matches_nonurgent_floor is true; that proof shows expired auctions share the nonurgent floor rather than urgent auction scoring. Every CRITICAL/HIGH finding must cite concrete code visible in CODE or a concrete proof contradiction.
