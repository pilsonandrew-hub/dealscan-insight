name: DealerScope Watchdog Hunter

on:
  schedule:
    - cron: '0 */10 * * *'   # Watchdog Hunter every 10 hours to reduce alert/action noise
  workflow_dispatch:

permissions:
  contents: read


jobs:
  watchdog-hunter:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Watchdog Hunter — monitor scraper health and stale deal flow
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: "-1003672399222"
        run: |
          python3 << 'PYEOF'
          import json, urllib.request, ssl, datetime, sys, os

          APIFY_TOKEN = os.environ["APIFY_TOKEN"]
          BOT_TOKEN = os.environ["BOT_TOKEN"]
          CHAT_ID = os.environ["CHAT_ID"]

          # Watchdog Hunter scope: lightweight health/staleness monitoring only.
          # Heavy source discovery stays on the 12hr sweeps.
          # ds-hibid is retired; ds-hibid-v2 is the active HiBid source.
          ACTORS = {
              "ds-govdeals":       {"id": "CuKaIAcWyFS0EPrAz", "max_age_hours": 15},
              "ds-publicsurplus":  {"id": "9xxQLlRsROnSgA42i", "max_age_hours": 15},
              "ds-municibid":      {"id": "svmsItf3CRBZuIntp", "max_age_hours": 15},
              "ds-gsaauctions":    {"id": "fvDnYmGuFBCrwpEi9", "max_age_hours": 15},
              "ds-allsurplus":     {"id": "gYGIfHeYeN3EzmLnB", "max_age_hours": 15},
              "ds-govplanet":      {"id": "pO2t5UDoSVmO1gvKJ", "max_age_hours": 15},
              "ds-proxibid":       {"id": "bxhncvtHEP712WX2e", "max_age_hours": 15},
              "ds-equipmentfacts":  {"id": "0XjoegYZVcPldLstl", "max_age_hours": 9},
              "ds-usgovbid":       {"id": "6XO9La81aEmtsCT3g", "max_age_hours": 15},
              "ds-jjkane":         {"id": "lvb7T6VMFfNUQpqlq", "max_age_hours": 15},
              "ds-hibid-v2":       {"id": "7s9e0eATTt1kuGGfE", "max_age_hours": 15},
              "ds-bidspotter":     {"id": "5Eu3hfCcBBdzp6I1u", "max_age_hours": 15},
          }

          ctx = ssl.create_default_context()
          now = datetime.datetime.now(datetime.timezone.utc)
          running_cutoff = now - datetime.timedelta(hours=3)  # allow legitimate in-flight runs
          stalled = []

          for name, actor in ACTORS.items():
              actor_id = actor["id"]
              cutoff = now - datetime.timedelta(hours=actor["max_age_hours"])
              # Query most recent run (any status), sorted desc by creation time
              url = f"https://api.apify.com/v2/acts/{actor_id}/runs?limit=1&desc=1&token={APIFY_TOKEN}"
              req = urllib.request.Request(url)
              try:
                  with urllib.request.urlopen(req, context=ctx, timeout=15) as r:
                      data = json.loads(r.read())
                  runs = data.get("data", {}).get("items", [])
                  if not runs:
                      stalled.append(f"<b>{name}</b>: no runs found")
                      continue

                  run = runs[0]
                  status = run.get("status", "UNKNOWN")
                  started_at = run.get("startedAt", "")

                  if not started_at:
                      stalled.append(f"<b>{name}</b>: no startedAt in latest run (status={status})")
                      continue

                  run_time = datetime.datetime.fromisoformat(started_at.replace("Z", "+00:00"))

                  if status == "ABORTED":
                      # Aborted — auto-retrigger silently, only alert if it keeps happening
                      retrigger_url = f"https://api.apify.com/v2/acts/{actor_id}/runs?token={APIFY_TOKEN}"
                      retrigger_req = urllib.request.Request(retrigger_url, data=b'{}', method='POST',
                          headers={'Content-Type': 'application/json'})
                      try:
                          with urllib.request.urlopen(retrigger_req, context=ctx) as rr:
                              pass  # silently retrigger
                      except Exception:
                          stalled.append(f"<b>{name}</b>: ABORTED and retrigger failed")
                  elif status in ("RUNNING", "READY"):
                      # In-flight / queued is fine unless it has been stuck for too long
                      if run_time < running_cutoff:
                          hours_ago = round((now - run_time).total_seconds() / 3600, 1)
                          stalled.append(f"<b>{name}</b>: still {status} after {hours_ago}h ({started_at[:16]}Z)")
                  elif status != "SUCCEEDED":
                      # Failed / timed out / unknown terminal state — alert
                      stalled.append(f"<b>{name}</b>: last run status={status} at {started_at[:16]}Z")
                  elif run_time < cutoff:
                      # Succeeded but too long ago
                      hours_ago = round((now - run_time).total_seconds() / 3600, 1)
                      stalled.append(f"<b>{name}</b>: last success {hours_ago}h ago ({started_at[:16]}Z)")

              except Exception as e:
                  stalled.append(f"<b>{name}</b>: error checking — {e}")

          if stalled:
              def send_telegram(text):
                  payload = json.dumps({"chat_id": CHAT_ID, "text": text, "parse_mode": "HTML"}).encode()
                  req = urllib.request.Request(
                      f"https://api.telegram.org/bot{BOT_TOKEN}/sendMessage",
                      data=payload, headers={"Content-Type": "application/json"}, method="POST"
                  )
                  with urllib.request.urlopen(req, context=ctx) as r:
                      return json.loads(r.read())

              msg = "⚠️ <b>DealerScope Watchdog Hunter Alert</b>\n\n" + "\n".join(stalled)
              send_telegram(msg)
              print("Stall detected, alert sent:\n" + "\n".join(stalled))
              # Red run is intentional when watchdog finds real scraper health problems.
              # Telegram is the operator alert; GitHub status is the audit trail.
              sys.exit(1)
          else:
              print("Watchdog Hunter: all monitored scrapers healthy")
          PYEOF
