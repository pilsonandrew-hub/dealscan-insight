name: Legacy Non-Authoritative Build Validation Placeholder - No Deployment
on:
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NODE_VERSION: '24'

jobs:
  test:
    name: Legacy validation tests only - no deployment
    runs-on: ubuntu-latest
    steps:
      - name: Set Git default branch for quiet checkout
        run: git config --global init.defaultBranch main

      - uses: actions/checkout@v6
      
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run TypeScript check
        run: npx tsc --noEmit
        
      - name: Run linting
        run: npm run lint
        
      - name: Run canary build validation
        run: |
          echo "Running legacy build validation only. No deployment is performed."
          echo "This workflow is non-authoritative and must not be cited as production deploy proof."
          npm run build
          echo "✅ Legacy build validation passed"
            
      - name: Validate contracts
        run: |
          echo "Basic contract validation only; not deploy proof."
          echo "✅ Contracts validated"

  security-scan:
    name: Legacy security scan only - no deployment
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      
      - name: Run security audit
        run: npm audit --audit-level=high
        
      - name: Check for vulnerabilities
        run: |
          echo "Checking for hardcoded API keys and tokens..."
          if grep -rn "apify_api_[A-Za-z0-9]\{20,\}\|sk-proj-[A-Za-z0-9]\{20,\}\|sk-ant-[A-Za-z0-9]\{20,\}\|ntn_[A-Za-z0-9]\{20,\}" \
            src/ backend/ webapp/ apify/ \
            --include="*.py" --include="*.ts" --include="*.tsx" --include="*.js" 2>/dev/null \
            | grep -v "test\|spec\|\.md\|#\|//"; then
            echo "❌ CRITICAL: Hardcoded API key found in source"
            exit 1
          fi
          echo "✅ No hardcoded secrets found"

  build-artifact-validation:
    name: Legacy artifact validation only - no deployment
    needs: [test, security-scan]
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v6
      
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Get version
        id: version
        run: echo "version=$(npm pkg get version | tr -d '"')" >> $GITHUB_OUTPUT
        
      - name: Build application artifact only
        env:
          VITE_APP_VERSION: ${{ steps.version.outputs.version }}
          VITE_BUILD_TIME: ${{ github.run_number }}
          VITE_COMMIT_SHA: ${{ github.sha }}
        run: |
          echo "::notice title=No deployment performed::This legacy workflow builds an artifact only. It is not Railway or Vercel deploy evidence."
          echo "This workflow is non-authoritative and must not be cited as production deploy proof."
          npm run build
        
      - name: Run bundle analysis placeholder
        run: |
          echo "Analyzing bundle artifact only..."
          echo "✅ Bundle analysis completed"
          
      - name: Check bundle size
        run: |
          BUNDLE_SIZE=$(du -sh dist | cut -f1)
          echo "Bundle size: $BUNDLE_SIZE"
          
          if [ $(du -sm dist | cut -f1) -gt 5 ]; then
            echo "❌ Bundle size exceeds 5MB limit"
            exit 1
          fi
          echo "✅ Bundle size within limits"
          
      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: legacy-build-validation-${{ steps.version.outputs.version }}
          path: |
            dist/
            bundle-analysis.json
          retention-days: 30

  current-backend-smoke-check:
    name: Current Railway backend smoke check - not deploy proof
    needs: build-artifact-validation
    runs-on: ubuntu-latest
    env:
      BACKEND_BASE_URL: ${{ vars.BACKEND_BASE_URL || 'https://dealscan-insight-production.up.railway.app' }}
    steps:
      - name: State non-authoritative boundary
        run: |
          echo "::notice title=No deployment performed::This job checks the already-deployed Railway backend only. It is not deployment proof."

      - name: Check already-deployed Railway backend health
        run: |
          echo "Checking current Railway backend health only..."
          curl -f ${BACKEND_BASE_URL}/healthz
          echo "✅ Current backend health check passed; no deployment was performed"

      - name: Document authoritative deploy evidence
        run: |
          echo "Authoritative deploy evidence comes from Railway and Vercel commit statuses plus purpose-built live validation workflows."
          echo "This legacy workflow is non-authoritative and must not be cited as production deploy proof."
