name: Pricing Coverage Gap Proof

on:
  workflow_dispatch:
    inputs:
      lookback_days:
        description: "Opportunity lookback window in days"
        required: true
        default: "14"
      max_mileage:
        description: "Maximum mileage for clean proxy opportunity reporting"
        required: true
        default: "100000"
      max_age_years:
        description: "Maximum vehicle age in years for clean proxy opportunity reporting"
        required: true
        default: "10"
      limit:
        description: "Maximum candidates to print"
        required: true
        default: "100"
      grouped:
        description: "Print aggregate recovery groups instead of row-level candidates"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  proof:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      LOOKBACK_DAYS: ${{ inputs.lookback_days }}
      MAX_MILEAGE: ${{ inputs.max_mileage }}
      MAX_AGE_YEARS: ${{ inputs.max_age_years }}
      LIMIT: ${{ inputs.limit }}
      GROUPED: ${{ inputs.grouped }}
    steps:
      - name: Set Git default branch for quiet checkout
        run: git config --global init.defaultBranch main

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Python runtime dependency
        run: |
          python3 -m pip install --disable-pip-version-check --no-cache-dir psycopg2-binary==2.9.9

      - name: Run pricing coverage gap proof through Supabase REST
        run: |
          set -euo pipefail
          args=(
            --via-rest
            --lookback-days "${LOOKBACK_DAYS}"
            --max-mileage "${MAX_MILEAGE}"
            --max-age-years "${MAX_AGE_YEARS}"
            --limit "${LIMIT}"
          )
          if [[ "${GROUPED}" == "true" ]]; then
            args+=(--grouped)
          fi
          python3 scripts/report_pricing_coverage_gaps.py "${args[@]}"
