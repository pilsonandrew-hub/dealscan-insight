# Vercel Production Auto-Deploy
#
# SETUP REQUIRED: Andrew needs to add the following 3 secrets in
# GitHub Settings → Secrets and variables → Actions → New repository secret:
#
#   VERCEL_TOKEN      — from vercel.com/account/tokens
#   VERCEL_ORG_ID     — from vercel.com/[team]/settings (Team ID)
#   VERCEL_PROJECT_ID — from vercel.com/[team]/[project]/settings (Project ID)
#
name: Deploy to Vercel (Production)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
