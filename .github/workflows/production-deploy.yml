name: Legacy Build and Deploy Placeholder (manual only)
on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NODE_VERSION: '24'
  SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
  SUPABASE_PROJECT_ID: lbnxzvqppccajllsqaaw

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run TypeScript check
        run: npx tsc --noEmit
        
      - name: Run linting
        run: npm run lint || echo "Lint warnings present — build continues"
        
      - name: Run canary tests
        run: |
          echo "Running basic canary tests..."
          npm run build
          echo "✅ Canary tests passed"
            
      - name: Validate contracts
        run: |
          echo "Basic contract validation..."
          echo "✅ Contracts validated"

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Run security audit
        run: npm audit --audit-level=high || echo "⚠️ npm audit warnings present — non-blocking"
        
      - name: Check for vulnerabilities
        run: |
          echo "Checking for hardcoded API keys and tokens..."
          if grep -rn "apify_api_[A-Za-z0-9]\{20,\}\|sk-proj-[A-Za-z0-9]\{20,\}\|sk-ant-[A-Za-z0-9]\{20,\}\|ntn_[A-Za-z0-9]\{20,\}" \
            src/ backend/ webapp/ apify/ \
            --include="*.py" --include="*.ts" --include="*.tsx" --include="*.js" 2>/dev/null \
            | grep -v "test\|spec\|\.md\|#\|//"; then
            echo "❌ CRITICAL: Hardcoded API key found in source"
            exit 1
          fi
          echo "✅ No hardcoded secrets found"
          echo "✅ No hardcoded secrets detected"

  build:
    needs: [test, security-scan]
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Get version
        id: version
        run: echo "version=$(npm pkg get version | tr -d '"')" >> $GITHUB_OUTPUT
        
      - name: Build application
        env:
          VITE_APP_VERSION: ${{ steps.version.outputs.version }}
          VITE_BUILD_TIME: ${{ github.run_number }}
          VITE_COMMIT_SHA: ${{ github.sha }}
        run: npm run build
        
      - name: Run bundle analysis
        run: |
          echo "Analyzing bundle..."
          echo "✅ Bundle analysis completed"
          
      - name: Check bundle size
        run: |
          BUNDLE_SIZE=$(du -sh dist | cut -f1)
          echo "Bundle size: $BUNDLE_SIZE"
          
          # Fail if bundle is too large (>5MB)
          if [ $(du -sm dist | cut -f1) -gt 5 ]; then
            echo "❌ Bundle size exceeds 5MB limit"
            exit 1
          fi
          echo "✅ Bundle size within limits"
          
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ steps.version.outputs.version }}
          path: |
            dist/
            bundle-analysis.json
          retention-days: 30

  deploy-staging:
    needs: build
    runs-on: ubuntu-latest
    environment: staging
    env:
      BACKEND_BASE_URL: ${{ vars.BACKEND_BASE_URL || 'https://dealscan-insight-production.up.railway.app' }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-${{ needs.build.outputs.version }}
          
      - name: Legacy staging deploy placeholder
        run: |
          echo "🚀 Running legacy staging deploy placeholder..."
          # Add your staging deployment commands here
          # Example: rsync, scp, or cloud provider CLI
          
      - name: Run backend smoke check
        run: |
          echo "🧪 Running smoke tests on Railway backend..."
          curl -f ${BACKEND_BASE_URL}/healthz || echo "⚠️ Health check failed — non-blocking for staging"
          echo "✅ Smoke tests complete"
          
      - name: Comment on PR (legacy placeholder)
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '🚀 Deployed to staging: https://staging.dealerscope.com'
            })

  deploy-production:
    needs: [build, deploy-staging]
    runs-on: ubuntu-latest
    environment: production
    if: github.ref == 'refs/heads/main' || github.event_name == 'release'
    env:
      BACKEND_BASE_URL: ${{ vars.BACKEND_BASE_URL || 'https://dealscan-insight-production.up.railway.app' }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-${{ needs.build.outputs.version }}
          
      - name: Validate legacy production placeholder assumptions
        run: |
          echo "🔍 Validating legacy production placeholder assumptions..."
          echo "⚠️ This workflow does not prove production readiness or perform a real backend deployment."
          
      - name: Database migration placeholder
        run: |
          echo "🗄️ Checking database migrations..."
          # Add Supabase migration commands here
          
      - name: Legacy production deploy placeholder
        run: |
          echo "🚀 Running legacy production deploy placeholder..."
          # Add your production deployment commands here
          
      - name: Health check against current Railway backend
        run: |
          echo "🏥 Running production health check..."
          sleep 30 # Wait for deployment
          
          # Check Railway backend health
          for i in {1..5}; do
            if curl -sf ${BACKEND_BASE_URL}/healthz; then
              echo "✅ Health check passed"
              break
            fi
            if [ $i -eq 5 ]; then
              echo "⚠️ Health check failed after 5 attempts — monitoring"
            fi
            sleep 10
          done
          
      - name: Performance placeholder
        run: |
          echo "⚡ Running performance check..."
          # Add Lighthouse CI or similar performance testing
          
      - name: Notify legacy deploy placeholder
        run: |
          echo "📢 Legacy deploy placeholder run completed!"
          echo "Version: ${{ needs.build.outputs.version }}"
          echo "URL: https://dealerscope.com"

  rollback:
    runs-on: ubuntu-latest
    environment: production
    if: failure() && (github.ref == 'refs/heads/main' || github.event_name == 'release')
    needs: [deploy-production]
    steps:
      - name: Rollback placeholder
        run: |
          echo "🔄 Rolling back deployment..."
          # Add rollback commands here
          
      - name: Notify rollback
        run: |
          echo "⚠️ Deployment rolled back due to failure"