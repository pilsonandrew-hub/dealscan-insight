name: DealerScope Automated Audit (12hr)

on:
  schedule:
    - cron: '0 */12 * * *'   # Every 12 hours
  workflow_dispatch:          # Manual trigger

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - name: Business Rule Validation
        id: rules
        run: |
          echo "=== DEALERSCOPE BUSINESS RULE AUDIT ==="
          FAILED=0

          # 1. Bid ceiling check
          if grep -n "0\.88\|0\.80" backend/ingest/score.py | grep -q "bid_ceiling\|CEILING\|ceiling"; then
            echo "✅ Bid ceiling constants present"
          else
            echo "❌ FAIL: Bid ceiling missing from score.py"
            FAILED=1
          fi

          # 2. Standard year cutoff (must be 10yr — Standard lane allows up to 10yr old vehicles)
          if grep -n "standard_year_cutoff\|STANDARD_YEAR_CUTOFF" backend/ingest/score.py | grep -q "10"; then
            echo "✅ Standard year cutoff correct (10yr for Standard lane)"
          else
            echo "❌ FAIL: Standard year cutoff missing or wrong — should be current_year - 10"
            FAILED=1
          fi

          # 3. Standard mileage (100k allowed for Standard lane per tier strategy)
          if grep -n "100000\|100_000" backend/ingest/score.py | grep -q .; then
            echo "✅ Standard mileage cap present (100k for Standard lane)"
          else
            echo "❌ FAIL: Standard lane mileage cap missing"
            FAILED=1
          fi

          # 4. Rust state filter present
          if grep -rn "HIGH_RUST_STATES" backend/ webapp/ --include="*.py" | grep -q ":"; then
            echo "✅ Rust state filter present in backend"
          else
            echo "❌ FAIL: Rust state filter missing from backend"
            FAILED=1
          fi

          # 5. Zero bid protection
          if grep -n "zero.*bid\|bid.*zero\|bid.*<= 0\|bid == 0\|not bid" backend/ingest/score.py | head -1 | grep -q .; then
            echo "✅ Zero bid protection present"
          else
            echo "⚠️ WARNING: Zero bid protection may be missing in score.py"
          fi

          # 6. No hardcoded secrets
          if grep -rn "apify_api_[A-Za-z0-9]\{20,\}\|sk-proj-[A-Za-z0-9]\|sk-ant-[A-Za-z0-9]\|ntn_[A-Za-z0-9]" \
            src/ backend/ webapp/ apify/ \
            --include="*.py" --include="*.ts" --include="*.tsx" --include="*.js" 2>/dev/null \
            | grep -v "test\|spec\|\.md\|#\|//"; then
            echo "❌ FAIL: Hardcoded API key found in source"
            FAILED=1
          else
            echo "✅ No hardcoded secrets"
          fi

          # 7. user_id filter in outcomes summary
          if grep -A 10 "get_outcomes_summary\|outcomes_summary" webapp/routers/outcomes.py 2>/dev/null | grep -q "user_id"; then
            echo "✅ outcomes summary filters by user_id"
          else
            echo "❌ FAIL: outcomes summary missing user_id filter — data leak!"
            FAILED=1
          fi

          # 8. No unapproved localhost in active frontend runtime surfaces
          if grep -RIn "localhost" src/services src/components src/hooks src/utils src/config \
            --include="*.ts" --include="*.tsx" 2>/dev/null \
            | grep -v "\.bak:" \
            | grep -v "urlSecurity\.ts:" \
            | grep -v "inputSanitizer\.ts:" \
            | grep -v "system-tester\.ts:" \
            | grep -v "useWebSocket\.ts:"; then
            echo "❌ FAIL: unapproved localhost found in active frontend runtime surfaces"
            FAILED=1
          else
            echo "✅ No unapproved localhost in active frontend runtime surfaces"
          fi

          echo ""
          echo "=== AUDIT COMPLETE ==="
          exit $FAILED

      - name: AI Code Review (Cursor)
        if: github.event_name == 'pull_request'
        env:
          OPENROUTER_KEY: ${{ secrets.OPENROUTER_KEY }}
        run: |
          # Get changed files
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          DIFF=$(git diff "$BASE_SHA".."$HEAD_SHA" -- '*.py' '*.ts' '*.tsx' '*.js' '*.sql' | head -c 60000)

          if [ -z "$DIFF" ]; then
            echo "No code changes to review."
            exit 0
          fi

          PAYLOAD=$(jq -n --arg diff "$DIFF" '{
            "model": "deepseek/deepseek-v3.2",
            "messages": [
              {"role": "system", "content": "You are a senior code reviewer for DealerScope, a vehicle arbitrage platform. Review the diff and flag: 1) Auth/security issues, 2) Business rule violations (Premium lane: max age 4yr, max mileage 50k, bid ceiling 0.88; Standard lane: max age 10yr, max mileage 100k plus mileage-per-year constraint, bid ceiling 0.80; rust state filter; min margin $1500/$2500), 3) Silent failures, 4) Data integrity issues. Be concise and actionable."},
              {"role": "user", "content": $diff}
            ]
          }')

          RESPONSE=$(curl -s -X POST https://openrouter.ai/api/v1/chat/completions \
            -H "Authorization: Bearer $OPENROUTER_KEY" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          REVIEW=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // "No review returned"')
          echo "## 🤖 Cursor AI Review" >> $GITHUB_STEP_SUMMARY
          echo "$REVIEW" >> $GITHUB_STEP_SUMMARY
          echo "$REVIEW"

      - name: Deep Audit (Gemini — scheduled runs only)
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        env:
          GEMINI_KEY: ${{ secrets.GEMINI_API_KEY }}
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: "-1003672399222"
        run: |
          python3 << 'PYEOF'
          import json, urllib.request, ssl, os, datetime

          GEMINI_KEY = os.environ["GEMINI_KEY"]
          BOT_TOKEN = os.environ.get("BOT_TOKEN", "")
          CHAT_ID = os.environ.get("CHAT_ID", "")
          ctx = ssl.create_default_context()

          # Read key files for audit
          files_to_audit = [
            "backend/ingest/score.py",
            "webapp/routers/ingest.py",
            "webapp/routers/outcomes.py",
            "webapp/routers/rover.py",
          ]

          code_bundle = ""
          for filepath in files_to_audit:
            try:
              with open(filepath) as f:
                content = f.read()[:15000]
              code_bundle += f"\n\n### FILE: {filepath}\n{content}"
            except FileNotFoundError:
              pass

          bid_ceiling_proof = []
          try:
            from backend.ingest.score import CURRENT_YEAR, score_deal
            proof_cases = [
              ("premium_over_88", dict(year=CURRENT_YEAR - 1, mileage=20000, bid=9000, mmr_ca=10000, state="CA", make="Toyota", model="RAV4", title_status="clean", photos=["x"])),
              ("standard_over_80", dict(year=CURRENT_YEAR - 5, mileage=60000, bid=8100, mmr_ca=10000, state="CA", make="Toyota", model="Camry", title_status="clean", photos=["x"])),
            ]
            for name, kwargs in proof_cases:
              result = score_deal(**kwargs)
              passed = (
                result.get("ceiling_pass") is False
                and result.get("ceiling_reason") == "bid_ceiling_exceeded"
                and result.get("investment_grade") == "Rejected"
                and float(result.get("dos_score", 999)) == 0.0
              )
              bid_ceiling_proof.append({
                "case": name,
                "passed": passed,
                "bid_ceiling_pct": result.get("bid_ceiling_pct"),
                "max_bid": result.get("max_bid"),
                "ceiling_pass": result.get("ceiling_pass"),
                "ceiling_reason": result.get("ceiling_reason"),
                "investment_grade": result.get("investment_grade"),
                "dos_score": result.get("dos_score"),
              })
          except Exception as e:
            bid_ceiling_proof.append({"error": repr(e)})

          bid_ceiling_gate_passed = (
            len(bid_ceiling_proof) == 2
            and all(row.get("passed") is True for row in bid_ceiling_proof)
          )

          def suppress_deterministically_false_findings(findings: str) -> str:
            """Remove findings contradicted by deterministic local proof.

            Model instructions are not a safety boundary. If the local score_deal()
            proof demonstrates hard bid-ceiling rejection, a model line claiming
            Missing Bid Ceiling Rejections is stale or hallucinated and must not
            be forwarded as a critical alert.
            """
            if not findings or not bid_ceiling_gate_passed:
              return findings
            kept = []
            suppressed = []
            for line in findings.splitlines():
              normalized = line.lower()
              is_bid_ceiling_false_positive = (
                "missing bid ceiling rejection" in normalized
                or "missing bid ceiling rejections" in normalized
                or ("bid ceiling" in normalized and "not rejected" in normalized)
                or ("bid ceiling" in normalized and "only receive" in normalized and "lower score" in normalized)
              )
              if is_bid_ceiling_false_positive:
                suppressed.append(line)
              else:
                kept.append(line)
            if suppressed:
              print("=== SUPPRESSED DETERMINISTIC FALSE FINDINGS ===")
              for line in suppressed:
                print(line)
              kept.append(
                "INFO | backend/ingest/score.py | Suppressed stale bid-ceiling audit finding | deterministic score_deal proof passed for premium_over_88 and standard_over_80."
              )
            return "\n".join(kept).strip()

          prompt = f"""Quick RED TEAM audit of DealerScope backend files.
          Business rules: Premium lane max age=4yr, max mileage=50k, bid ceiling=0.88. Standard lane max age=10yr, max mileage=100k, reject mileage-per-year >18000, bid ceiling=0.80. Rust states rejected.
          Deterministic bid-ceiling proof from score_deal() is below. Do NOT report "Missing Bid Ceiling Rejections" if both proof cases passed; only report it if the proof failed or the code contradicts the proof.
          BID_CEILING_PROOF:{json.dumps(bid_ceiling_proof, indent=2)}
          Report only CRITICAL and HIGH issues found. Format: SEVERITY | FILE | ISSUE | FIX
          Be concise — top 10 issues max.
          CODE:{code_bundle[:50000]}"""

          payload = json.dumps({
            "contents": [{"parts": [{"text": prompt}]}],
            "generationConfig": {"maxOutputTokens": 2000, "temperature": 0.0}
          }).encode()

          url = f"https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-pro-preview:generateContent?key={GEMINI_KEY}"
          req = urllib.request.Request(url, data=payload, headers={"Content-Type": "application/json"})

          try:
            with urllib.request.urlopen(req, context=ctx, timeout=60) as r:
              data = json.loads(r.read())
            raw_findings = data.get("candidates", [{}])[0].get("content", {}).get("parts", [{}])[0].get("text", "")
            findings = suppress_deterministically_false_findings(raw_findings)

            print("=== GEMINI AUDIT FINDINGS ===")
            print(findings)

            # Send to Telegram if there's anything critical after deterministic suppression.
            if findings and ("CRITICAL" in findings or "HIGH" in findings) and BOT_TOKEN:
              now = datetime.datetime.utcnow().strftime("%Y-%m-%d %H:%M UTC")
              msg = f"🔍 <b>DealerScope 12hr Audit — {now}</b>\n\n{findings[:3000]}"
              tg_payload = json.dumps({"chat_id": CHAT_ID, "text": msg, "parse_mode": "HTML"}).encode()
              tg_req = urllib.request.Request(
                f"https://api.telegram.org/bot{BOT_TOKEN}/sendMessage",
                data=tg_payload, headers={"Content-Type": "application/json"}, method="POST"
              )
              with urllib.request.urlopen(tg_req, context=ctx) as r:
                print("Telegram alert sent:", json.loads(r.read()).get("ok"))

          except Exception as e:
            print(f"Gemini audit error: {e}")
          PYEOF
