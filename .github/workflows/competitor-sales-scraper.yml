name: Competitor Sales Scraper

# Daily scrape of completed/sold auction listings (GovDeals, PublicSurplus,
# GovPlanet) into the competitor_sales table that feeds DOS ceiling pricing.

on:
  schedule:
    - cron: '0 9 * * *'   # 09:00 UTC daily (~1-2am PT)
  workflow_dispatch:
    inputs:
      sources:
        description: "Comma list of sources (govdeals,publicsurplus,govplanet). Blank = all."
        required: false
        default: ""
      max_pages:
        description: "Max result pages per source"
        required: false
        default: "10"
      dry_run:
        description: "Scrape & report without writing to Supabase"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  competitor-sales-scraper:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --disable-pip-version-check --no-cache-dir \
            supabase==2.30.0 httpx==0.27.2 beautifulsoup4==4.12.2 lxml==4.9.3 \
            "playwright>=1.40.0,<2.0.0"
          python -m playwright install --with-deps chromium

      - name: Run competitor sales scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          COMPETITOR_SCRAPER_SOURCES: ${{ inputs.sources }}
          COMPETITOR_SCRAPER_MAX_PAGES: ${{ inputs.max_pages || '10' }}
          COMPETITOR_SCRAPER_DRY_RUN: ${{ inputs.dry_run || 'false' }}
        run: |
          python scripts/run_competitor_sales_scraper.py
