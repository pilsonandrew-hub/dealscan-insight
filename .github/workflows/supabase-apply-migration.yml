name: DealerScope Supabase Apply Migration

on:
  workflow_dispatch:
    inputs:
      migration_file:
        description: "Migration SQL file under supabase/migrations/"
        required: true
        default: "20260603_post_close_outcome_requests.sql"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  apply-migration:
    runs-on: ubuntu-latest
    steps:
      - name: Set Git default branch for quiet checkout
        run: git config --global init.defaultBranch main

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Postgres client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Apply allowlisted Supabase migration
        env:
          MIGRATION_FILE: ${{ inputs.migration_file }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_DB_POOLER_HOST: ${{ secrets.SUPABASE_DB_POOLER_HOST }}
          SUPABASE_DB_POOLER_PORT: ${{ secrets.SUPABASE_DB_POOLER_PORT }}
        run: |
          set -euo pipefail

          case "${MIGRATION_FILE}" in
            supabase/migrations/*.sql)
              MIGRATION_PATH="${MIGRATION_FILE}"
              ;;
            *.sql)
              MIGRATION_PATH="supabase/migrations/${MIGRATION_FILE}"
              ;;
            *)
              echo "Migration file must be a SQL file under supabase/migrations." >&2
              exit 2
              ;;
          esac

          case "${MIGRATION_PATH}" in
            *../*|../*|/*)
              echo "Migration path traversal is not allowed." >&2
              exit 2
              ;;
          esac

          if [ ! -f "${MIGRATION_PATH}" ]; then
            echo "Migration file was not found." >&2
            exit 2
          fi

          if [ -z "${SUPABASE_DB_PASSWORD}" ] || [ -z "${SUPABASE_PROJECT_ID}" ]; then
            echo "Missing Supabase DB secret inputs." >&2
            exit 2
          fi

          DATABASE_URL="$(python3 - <<'PY'
          import os
          import re
          from urllib.parse import quote

          supabase_url = os.environ.get("SUPABASE_URL", "").strip()
          match = re.search(r"https://([a-z0-9]+)\.supabase\.co", supabase_url)
          project_id = match.group(1) if match else os.environ["SUPABASE_PROJECT_ID"].strip()
          password = quote(os.environ["SUPABASE_DB_PASSWORD"], safe="")
          pooler_host = os.environ.get("SUPABASE_DB_POOLER_HOST", "").strip()
          if not pooler_host:
              pooler_host = "aws-0-us-west-2.pooler.supabase.com"
          pooler_port = os.environ.get("SUPABASE_DB_POOLER_PORT", "").strip() or "5432"
          print(f"postgresql://postgres.{project_id}:{password}@{pooler_host}:{pooler_port}/postgres?sslmode=require")
          PY
          )"

          psql "${DATABASE_URL}" -v ON_ERROR_STOP=1 -f "${MIGRATION_PATH}"
