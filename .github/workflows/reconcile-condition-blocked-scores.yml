name: Reconcile Condition-Blocked Scores

on:
  workflow_dispatch:
    inputs:
      apply:
        description: "Write updates. Leave false for dry-run."
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      limit:
        description: "Maximum active DOS>=80 rows to inspect"
        required: true
        default: "1000"
        type: string

permissions:
  contents: read

jobs:
  reconcile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Reconcile explicit condition-blocked scores
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          APPLY: ${{ github.event.inputs.apply }}
          LIMIT: ${{ github.event.inputs.limit }}
        run: |
          set -euo pipefail
          args=(--limit "${LIMIT:-1000}")
          if [ "${APPLY}" = "true" ]; then
            args+=(--apply)
          fi
          python scripts/reconcile_condition_blocked_scores.py "${args[@]}"
