name: DealerScope Automated Audit (12hr)

on:
  schedule:
    - cron: '0 */12 * * *'   # Every 12 hours
  workflow_dispatch:          # Manual trigger

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Set Git default branch for quiet checkout
        run: git config --global init.defaultBranch main

      - uses: actions/checkout@v6

      - name: Business Rule Validation
        id: rules
        run: |
          echo "=== DEALERSCOPE BUSINESS RULE AUDIT ==="
          FAILED=0

          # 1. Bid ceiling check — canonical constants may live outside score.py.
          if grep -RIn "PREMIUM_BID_CEILING_PCT *= *0\.88\|STANDARD_BID_CEILING_PCT *= *0\.80\|bid_ceiling_pct_for_tier" backend/business_rules backend/ingest --include="*.py" | grep -q .; then
            echo "✅ Bid ceiling constants/gates present"
          else
            echo "❌ FAIL: Bid ceiling missing from score.py"
            FAILED=1
          fi

          # 2. Standard year cutoff (must be 10yr — Standard lane allows up to 10yr old vehicles)
          if grep -RIn "STANDARD_VEHICLE_MAX_AGE_YEARS *= *10\|standard_year_cutoff" backend/business_rules backend/ingest --include="*.py" | grep -q .; then
            echo "✅ Standard year cutoff correct (10yr for Standard lane)"
          else
            echo "❌ FAIL: Standard year cutoff missing or wrong — should be current_year - 10"
            FAILED=1
          fi

          # 3. Standard mileage (100k allowed for Standard lane per tier strategy)
          if grep -n "100000\|100_000" backend/ingest/score.py | grep -q .; then
            echo "✅ Standard mileage cap present (100k for Standard lane)"
          else
            echo "❌ FAIL: Standard lane mileage cap missing"
            FAILED=1
          fi

          # 4. Rust state filter present
          if grep -rn "HIGH_RUST_STATES" backend/ webapp/ --include="*.py" | grep -q ":"; then
            echo "✅ Rust state filter present in backend"
          else
            echo "❌ FAIL: Rust state filter missing from backend"
            FAILED=1
          fi

          # 5. Zero bid protection
          if grep -n "zero.*bid\|bid.*zero\|bid.*<= 0\|bid == 0\|not bid" backend/ingest/score.py | head -1 | grep -q .; then
            echo "✅ Zero bid protection present"
          else
            echo "⚠️ WARNING: Zero bid protection may be missing in score.py"
          fi

          # 6. No hardcoded secrets
          if grep -rn "apify_api_[A-Za-z0-9]\{20,\}\|sk-proj-[A-Za-z0-9]\|sk-ant-[A-Za-z0-9]\|ntn_[A-Za-z0-9]" \
            src/ backend/ webapp/ apify/ \
            --include="*.py" --include="*.ts" --include="*.tsx" --include="*.js" 2>/dev/null \
            | grep -v "test\|spec\|\.md\|#\|//"; then
            echo "❌ FAIL: Hardcoded API key found in source"
            FAILED=1
          else
            echo "✅ No hardcoded secrets"
          fi

          # 7. user_id filter in outcomes summary
          if grep -A 10 "get_outcomes_summary\|outcomes_summary" webapp/routers/outcomes.py 2>/dev/null | grep -q "user_id"; then
            echo "✅ outcomes summary filters by user_id"
          else
            echo "❌ FAIL: outcomes summary missing user_id filter — data leak!"
            FAILED=1
          fi

          # 8. No unapproved localhost in active frontend runtime surfaces
          if grep -RIn "localhost" src/services src/components src/hooks src/utils src/config \
            --include="*.ts" --include="*.tsx" 2>/dev/null \
            | grep -v "\.bak:" \
            | grep -v "urlSecurity\.ts:" \
            | grep -v "inputSanitizer\.ts:" \
            | grep -v "system-tester\.ts:" \
            | grep -v "useWebSocket\.ts:"; then
            echo "❌ FAIL: unapproved localhost found in active frontend runtime surfaces"
            FAILED=1
          else
            echo "✅ No unapproved localhost in active frontend runtime surfaces"
          fi

          echo ""
          echo "=== AUDIT COMPLETE ==="
          exit $FAILED

      - name: AI Code Review (Cursor)
        if: github.event_name == 'pull_request'
        env:
          OPENROUTER_KEY: ${{ secrets.OPENROUTER_KEY }}
        run: |
          # Get changed files
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          DIFF=$(git diff "$BASE_SHA".."$HEAD_SHA" -- '*.py' '*.ts' '*.tsx' '*.js' '*.sql' | head -c 60000)

          if [ -z "$DIFF" ]; then
            echo "No code changes to review."
            exit 0
          fi

          PAYLOAD=$(jq -n --arg diff "$DIFF" '{
            "model": "deepseek/deepseek-v3.2",
            "messages": [
              {"role": "system", "content": "You are a senior code reviewer for DealerScope, a vehicle arbitrage platform. Review the diff and flag: 1) Auth/security issues, 2) Business rule violations (Premium lane: max age 4yr, max mileage 50k, bid ceiling 0.88; Standard lane: max age 10yr, max mileage 100k plus mileage-per-year constraint, bid ceiling 0.80; rust state filter; min margin $1500/$2500), 3) Silent failures, 4) Data integrity issues. Be concise and actionable."},
              {"role": "user", "content": $diff}
            ]
          }')

          RESPONSE=$(curl -s -X POST https://openrouter.ai/api/v1/chat/completions \
            -H "Authorization: Bearer $OPENROUTER_KEY" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          REVIEW=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // "No review returned"')
          echo "## 🤖 Cursor AI Review" >> $GITHUB_STEP_SUMMARY
          echo "$REVIEW" >> $GITHUB_STEP_SUMMARY
          echo "$REVIEW"

      - name: Deep Audit (Gemini — scheduled runs only)
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        env:
          GEMINI_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_KEY: ${{ secrets.OPENROUTER_KEY }}
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: "-1003672399222"
          GEMINI_AUDIT_MAX_ATTEMPTS: "3"
          GEMINI_AUDIT_RETRY_DELAY_SECONDS: "60"
          GEMINI_OPENROUTER_MODEL: "google/gemini-2.5-flash"
        run: |
          python3 << 'PYEOF'
          import datetime, html, json, os, pathlib, re, ssl, time, urllib.error, urllib.request

          GEMINI_KEY = os.environ["GEMINI_KEY"]
          OPENROUTER_KEY = os.environ.get("OPENROUTER_KEY", "")
          BOT_TOKEN = os.environ.get("BOT_TOKEN", "")
          CHAT_ID = os.environ.get("CHAT_ID", "")
          MAX_ATTEMPTS = int(os.environ.get("GEMINI_AUDIT_MAX_ATTEMPTS", "3"))
          RETRY_DELAY_SECONDS = int(os.environ.get("GEMINI_AUDIT_RETRY_DELAY_SECONDS", "60"))
          OPENROUTER_MODEL = os.environ.get("GEMINI_OPENROUTER_MODEL", "google/gemini-2.5-flash")
          ctx = ssl.create_default_context()

          # Read key files for audit
          files_to_audit = [
            "backend/ingest/score.py",
            "webapp/routers/ingest.py",
            "webapp/routers/outcomes.py",
            "webapp/routers/rover.py",
          ]

          code_bundle = ""
          for filepath in files_to_audit:
            try:
              with open(filepath) as f:
                content = f.read()[:15000]
              code_bundle += f"\n\n### FILE: {filepath}\n{content}"
            except FileNotFoundError:
              pass

          bid_ceiling_proof = []
          business_rule_proof = []
          try:
            from backend.ingest.score import CURRENT_YEAR, score_deal
            proof_cases = [
              ("premium_over_88", dict(year=CURRENT_YEAR - 1, mileage=20000, bid=9000, mmr_ca=10000, state="CA", make="Toyota", model="RAV4", title_status="clean", photos=["x"])),
              ("standard_over_80", dict(year=CURRENT_YEAR - 5, mileage=60000, bid=8100, mmr_ca=10000, state="CA", make="Toyota", model="Camry", title_status="clean", photos=["x"])),
            ]
            for name, kwargs in proof_cases:
              result = score_deal(**kwargs)
              passed = (
                result.get("ceiling_pass") is False
                and result.get("ceiling_reason") == "bid_ceiling_exceeded"
                and result.get("investment_grade") == "Rejected"
                and float(result.get("dos_score", 999)) == 0.0
              )
              bid_ceiling_proof.append({
                "case": name,
                "passed": passed,
                "bid_ceiling_pct": result.get("bid_ceiling_pct"),
                "max_bid": result.get("max_bid"),
                "ceiling_pass": result.get("ceiling_pass"),
                "ceiling_reason": result.get("ceiling_reason"),
                "investment_grade": result.get("investment_grade"),
                "dos_score": result.get("dos_score"),
              })
            business_rule_cases = [
              ("rust_state_oh", dict(year=CURRENT_YEAR - 3, mileage=30000, bid=5000, mmr_ca=12000, state="OH", make="Toyota", model="Camry", title_status="clean", photos=["x"])),
              ("standard_miles_per_year_over_18000", dict(year=CURRENT_YEAR - 5, mileage=100000, bid=5000, mmr_ca=12000, state="CA", make="Toyota", model="Camry", title_status="clean", photos=["x"])),
            ]
            for name, kwargs in business_rule_cases:
              result = score_deal(**kwargs)
              if name == "rust_state_oh":
                passed = (
                  result.get("investment_grade") == "Rejected"
                  and float(result.get("dos_score", 999)) == 0.0
                  and result.get("vehicle_tier") == "rejected"
                  and result.get("ceiling_reason") == "high_rust_state_rejected"
                  and "rust_state_source" in (result.get("risk_flags") or [])
                )
              else:
                passed = (
                  result.get("investment_grade") == "Rejected"
                  and float(result.get("dos_score", 999)) == 0.0
                  and result.get("vehicle_tier") == "rejected"
                  and "mileage_per_year_gt_18000" in (result.get("risk_flags") or [])
                )
              business_rule_proof.append({
                "case": name,
                "passed": passed,
                "investment_grade": result.get("investment_grade"),
                "dos_score": result.get("dos_score"),
                "vehicle_tier": result.get("vehicle_tier"),
                "ceiling_pass": result.get("ceiling_pass"),
                "ceiling_reason": result.get("ceiling_reason"),
                "risk_flags": result.get("risk_flags"),
              })
          except Exception as e:
            bid_ceiling_proof.append({"error": repr(e)})
            business_rule_proof.append({"error": repr(e)})

          bid_ceiling_gate_passed = (
            len(bid_ceiling_proof) == 2
            and all(row.get("passed") is True for row in bid_ceiling_proof)
          )
          business_rule_gate_passed = (
            len(business_rule_proof) == 2
            and all(row.get("passed") is True for row in business_rule_proof)
          )
          audit_evidence_proof = {}
          try:
            from backend.ingest.score import _auction_velocity_score, _coerce_float, _round_price_basis
            expired = (datetime.datetime.now(datetime.timezone.utc) - datetime.timedelta(hours=2)).isoformat()
            audit_evidence_proof["expired_auction_velocity_non_urgent"] = (
              _auction_velocity_score({"auction_end": expired}) == 25.0
            )
            audit_evidence_proof["round_price_basis_complete"] = (_round_price_basis(12345) == 12000)
            audit_evidence_proof["coerce_float_rejects_invalid_and_nonfinite"] = (
              _coerce_float("not-a-number") is None
              and _coerce_float("nan") is None
              and _coerce_float("inf") is None
            )
            audit_evidence_proof["coerce_float_normalizes_formatted_numeric_strings"] = (
              _coerce_float("12,345") == 12345.0
              and _coerce_float(" $12,345.67 ") == 12345.67
            )
          except Exception as proof_error:
            audit_evidence_proof["score_proof_error"] = repr(proof_error)

          try:
            ingest_source = pathlib.Path("webapp/routers/ingest.py").read_text(encoding="utf-8")
            outcomes_source = pathlib.Path("webapp/routers/outcomes.py").read_text(encoding="utf-8")
            migrations_text = "\n".join(
              path.read_text(encoding="utf-8")
              for path in pathlib.Path("supabase/migrations").glob("*.sql")
            )
            audit_evidence_proof["direct_pg_webhook_insert_parameterized"] = (
              "def _insert_webhook_log_direct_pg" in ingest_source
              and "values (%s, %s, %s, %s, %s, %s, %s)" in ingest_source
              and "psycopg2_extras.Json" in ingest_source
            )
            audit_evidence_proof["outcomes_system_opportunity_non_operator_rejected"] = (
              "System opportunity ownership not configured" in outcomes_source
              and "raise HTTPException(status_code=403" in outcomes_source
              and "if _is_operator_user(require_user_id)" in outcomes_source
              and "if not _is_operator_user(user_id)" in outcomes_source
            )
            audit_evidence_proof["dealer_sales_errors_logged_and_http_500"] = (
              "[OUTCOMES] dealer_sales persistence failed" in outcomes_source
              and 'HTTPException(status_code=500, detail="Failed to persist outcome evidence")' in outcomes_source
            )
            audit_evidence_proof["critical_audit_write_errors_handled_upstream"] = (
              "except CriticalAuditWriteError as e" in ingest_source
              and "Critical ingest audit write failed" in ingest_source
              and "[INGEST_AUDIT]" in ingest_source
            )
            audit_evidence_proof["canonical_duplicate_unique_index_present"] = (
              "idx_opportunities_canonical_unique" in migrations_text
              and "ON opportunities(canonical_id) WHERE is_duplicate = FALSE" in migrations_text
            )
          except Exception as proof_error:
            audit_evidence_proof["source_proof_error"] = repr(proof_error)
          # Exact false-positive titles suppressed only when deterministic proof passes:
          # Missing Rust State Rejection
          # Mileage-per-year Rejection Bypass
          # Incomplete Bid Ceiling Enforcement
          # Insecure Direct Object Reference
          # SQL Injection Vulnerability
          # Potential for Race Condition

          def suppress_deterministically_false_findings(findings: str) -> str:
            """Remove findings contradicted by deterministic local proof.

            Model instructions are not a safety boundary. If the local score_deal()
            proof demonstrates hard bid-ceiling rejection, a model line claiming
            Missing Bid Ceiling Rejections is stale or hallucinated and must not
            be forwarded as a critical alert.
            """
            if not findings or not (bid_ceiling_gate_passed or business_rule_gate_passed):
              return findings
            kept = []
            suppressed = []
            suppressing_false_positive_block = False
            for line in findings.splitlines():
              normalized = line.lower()
              starts_new_finding = bool(re.match(r"^\s*(?:\d+\.|[-*])\s+.*\|", line))
              if suppressing_false_positive_block:
                if not line.strip():
                  suppressing_false_positive_block = False
                  continue
                if starts_new_finding or normalized.strip().startswith(("**critical", "**high", "###")):
                  suppressing_false_positive_block = False
                else:
                  suppressed.append(line)
                  continue

              is_bid_ceiling_false_positive = bid_ceiling_gate_passed and (
                "missing bid ceiling rejection" in normalized
                or "missing bid ceiling rejections" in normalized
                or "incomplete bid ceiling enforcement" in normalized
                or ("bid ceiling" in normalized and "not rejected" in normalized)
                or ("bid ceiling" in normalized and "logic is missing" in normalized)
                or ("bid ceiling" in normalized and "only receive" in normalized and "lower score" in normalized)
              )
              is_rust_state_false_positive = business_rule_gate_passed and (
                "missing rust state rejection" in normalized
                or ("rust state" in normalized and "do not explicitly reject" in normalized)
                or ("rust state" in normalized and "not just a penalty" in normalized)
                or ("incomplete rust state rejection" in normalized)
                or ("rust state" in normalized and "only penalizes" in normalized)
              )
              is_mileage_per_year_false_positive = business_rule_gate_passed and (
                "mileage-per-year rejection bypass" in normalized
                or "mileage per year rejection bypass" in normalized
                or ("mileage-per-year" in normalized and "does not enforce a hard rejection" in normalized)
                or ("mileage_per_year_gt_18000" in normalized and "could still be accepted" in normalized)
              )
              if is_bid_ceiling_false_positive or is_rust_state_false_positive or is_mileage_per_year_false_positive:
                suppressed.append(line)
                suppressing_false_positive_block = True
              else:
                kept.append(line)
            if suppressed:
              print("=== SUPPRESSED DETERMINISTIC FALSE FINDINGS ===")
              for line in suppressed:
                print(line)
              kept.append(
                "INFO | backend/ingest/score.py | Suppressed stale business-rule audit finding | deterministic score_deal proof passed for bid ceiling, rust-state rejection, and Standard mileage-per-year rejection."
              )
            return "\n".join(kept).strip()

          def suppress_unsupported_or_contradicted_findings(findings: str) -> str:
            """Remove audit findings that lack evidence or contradict repo proof."""
            if not findings:
              return findings
            kept = []
            suppressed = []
            suppressing_block = False
            for line in findings.splitlines():
              normalized = line.lower()
              stripped = normalized.strip()
              starts_new_finding = bool(re.match(r"^\s*(?:\d+\.|[-*])\s+.*\|", line))
              starts_pipe_finding = stripped.startswith(("critical |", "high |"))
              starts_markdown_finding = stripped.startswith(("**critical", "**high", "###"))
              if suppressing_block:
                if not line.strip():
                  suppressing_block = False
                  continue
                if starts_new_finding or starts_pipe_finding or starts_markdown_finding:
                  suppressing_block = False
                else:
                  suppressed.append(line)
                  continue

              is_outcomes_idor_false_positive = (
                audit_evidence_proof.get("outcomes_system_opportunity_non_operator_rejected") is True
                and "insecure direct object reference" in normalized
                and (
                  "webapp/routers/outcomes.py" in normalized
                  or "_fetch_opportunity" in normalized
                  or "patch_outcome" in normalized
                )
              )
              is_sql_injection_false_positive = (
                audit_evidence_proof.get("direct_pg_webhook_insert_parameterized") is True
                and "sql injection vulnerability" in normalized
                and ("_insert_webhook_log_direct_pg" in normalized or "implied" in normalized)
              )
              is_round_price_basis_false_positive = (
                audit_evidence_proof.get("round_price_basis_complete") is True
                and "_round_price_basis" in normalized
                and any(term in normalized for term in ("incomplete", "truncated", "syntaxerror", "nameerror"))
              )
              is_coerce_float_false_positive = (
                audit_evidence_proof.get("coerce_float_rejects_invalid_and_nonfinite") is True
                and audit_evidence_proof.get("coerce_float_normalizes_formatted_numeric_strings") is True
                and "_coerce_float" in normalized
                and any(term in normalized for term in ("math.isfinite", "nonfinite", "less predictable", "inconsistent", "non-numeric", "missed conversions"))
              )
              is_outcomes_configuration_speculation = (
                audit_evidence_proof.get("outcomes_system_opportunity_non_operator_rejected") is True
                and "webapp/routers/outcomes.py" in normalized
                and any(term in normalized for term in ("system opportunities", "operator", "environment variable", "overly restrictive", "inconsistent authorization"))
              )
              is_ingest_error_handling_speculation = (
                audit_evidence_proof.get("critical_audit_write_errors_handled_upstream") is True
                and "webapp/routers/ingest.py" in normalized
                and "criticalauditwriteerror" in normalized
                and any(term in normalized for term in ("unhandled", "calling context", "not provided"))
              )
              is_dealer_sales_error_handling_false_positive = (
                audit_evidence_proof.get("dealer_sales_errors_logged_and_http_500") is True
                and "webapp/routers/outcomes.py" in normalized
                and "_upsert_dealer_sales_outcome" in normalized
                and any(term in normalized for term in ("unhandled", "runtimeerror", "supabase error"))
              )
              is_duplicate_race_mitigated = (
                audit_evidence_proof.get("canonical_duplicate_unique_index_present") is True
                and "potential for race condition" in normalized
                and "check_and_handle_duplicate" in normalized
              )
              is_unsupported_speculation = (
                ("while the code for" in normalized and "not provided" in normalized)
                or (stripped.startswith("**high** | webapp/routers/rover.") and stripped.count("|") < 3)
              )

              if (
                is_outcomes_idor_false_positive
                or is_sql_injection_false_positive
                or is_round_price_basis_false_positive
                or is_coerce_float_false_positive
                or is_outcomes_configuration_speculation
                or is_ingest_error_handling_speculation
                or is_dealer_sales_error_handling_false_positive
                or is_duplicate_race_mitigated
                or is_unsupported_speculation
              ):
                suppressed.append(line)
                suppressing_block = True
              else:
                kept.append(line)
            if suppressed:
              print("=== SUPPRESSED UNSUPPORTED OR CONTRADICTED FINDINGS ===")
              for line in suppressed:
                print(line)
              kept.append(
                "INFO | audit/evidence | Suppressed unsupported or contradicted audit finding | deterministic proof or source evidence contradicted the model finding."
              )
            return "\n".join(kept).strip()

          prompt = f"""Quick RED TEAM audit of DealerScope backend files.
          Business rules: Premium lane max age=4yr, max mileage=50k, bid ceiling=0.88. Standard lane max age=10yr, max mileage=100k, reject mileage-per-year >18000, bid ceiling=0.80. Rust states rejected.
          Deterministic bid-ceiling proof from score_deal() is below. Do NOT report "Missing Bid Ceiling Rejections" if both proof cases passed; only report it if the proof failed or the code contradicts the proof.
          BID_CEILING_PROOF:{json.dumps(bid_ceiling_proof, indent=2)}
          Deterministic rust-state and Standard mileage-per-year proof from score_deal() is below. Do NOT report "Missing Rust State Rejection" or "Mileage-per-year Rejection Bypass" if these proof cases passed; only report those issues if the proof failed or the code contradicts the proof.
          BUSINESS_RULE_PROOF:{json.dumps(business_rule_proof, indent=2)}
          Additional deterministic and source evidence is below. Do not report speculative, implied, potential, malformed, or contradicted findings. Every CRITICAL/HIGH finding must cite concrete code visible in CODE or a concrete proof contradiction.
          AUDIT_EVIDENCE_PROOF:{json.dumps(audit_evidence_proof, indent=2)}
          Report only CRITICAL and HIGH issues found. Format: SEVERITY | FILE | ISSUE | FIX
          Be concise — top 10 issues max.
          CODE:{code_bundle[:50000]}"""

          payload = json.dumps({
            "contents": [{"parts": [{"text": prompt}]}],
            "generationConfig": {"maxOutputTokens": 2000, "temperature": 0.0}
          }).encode()

          url = f"https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-pro-preview:generateContent?key={GEMINI_KEY}"
          req = urllib.request.Request(url, data=payload, headers={"Content-Type": "application/json"})

          def send_telegram_html_message(message: str) -> None:
            if not BOT_TOKEN:
              return
            tg_payload = json.dumps({"chat_id": CHAT_ID, "text": message, "parse_mode": "HTML"}).encode()
            tg_req = urllib.request.Request(
              f"https://api.telegram.org/bot{BOT_TOKEN}/sendMessage",
              data=tg_payload, headers={"Content-Type": "application/json"}, method="POST"
            )
            with urllib.request.urlopen(tg_req, context=ctx) as r:
              print("Telegram alert sent:", json.loads(r.read()).get("ok"))

          def fetch_direct_gemini_audit() -> dict:
            last_error = None
            retryable_statuses = {429, 500, 502, 503, 504}
            for attempt in range(1, MAX_ATTEMPTS + 1):
              try:
                with urllib.request.urlopen(req, context=ctx, timeout=60) as r:
                  return json.loads(r.read())
              except urllib.error.HTTPError as e:
                last_error = e
                if e.code not in retryable_statuses or attempt == MAX_ATTEMPTS:
                  break
                print(f"Gemini audit attempt {attempt}/{MAX_ATTEMPTS} got HTTP {e.code}; retrying in {RETRY_DELAY_SECONDS}s")
                time.sleep(RETRY_DELAY_SECONDS)
              except urllib.error.URLError as e:
                last_error = e
                if attempt == MAX_ATTEMPTS:
                  break
                print(f"Gemini audit attempt {attempt}/{MAX_ATTEMPTS} failed with URL error; retrying in {RETRY_DELAY_SECONDS}s: {e}")
                time.sleep(RETRY_DELAY_SECONDS)
            raise RuntimeError(f"Gemini audit unavailable after {MAX_ATTEMPTS} attempt(s): {last_error}") from last_error

          def fetch_openrouter_gemini_audit() -> dict:
            if not OPENROUTER_KEY:
              raise RuntimeError("OPENROUTER_KEY is not configured for Gemini fallback")

            openrouter_payload = json.dumps({
              "model": OPENROUTER_MODEL,
              "messages": [
                {
                  "role": "system",
                  "content": "You are a senior red-team auditor for DealerScope. Report only CRITICAL and HIGH issues. Format: SEVERITY | FILE | ISSUE | FIX.",
                },
                {"role": "user", "content": prompt},
              ],
              "temperature": 0.0,
              "max_tokens": 2000,
            }).encode()
            openrouter_req = urllib.request.Request(
              "https://openrouter.ai/api/v1/chat/completions",
              data=openrouter_payload,
              headers={
                "Authorization": f"Bearer {OPENROUTER_KEY}",
                "Content-Type": "application/json",
              },
              method="POST",
            )

            last_error = None
            retryable_statuses = {408, 429, 500, 502, 503, 504}
            for attempt in range(1, MAX_ATTEMPTS + 1):
              try:
                with urllib.request.urlopen(openrouter_req, context=ctx, timeout=60) as r:
                  data = json.loads(r.read())
                text = data.get("choices", [{}])[0].get("message", {}).get("content", "")
                if not text:
                  raise RuntimeError("OpenRouter Gemini returned no audit content")
                return {"candidates": [{"content": {"parts": [{"text": text}]}}]}
              except urllib.error.HTTPError as e:
                last_error = e
                if e.code not in retryable_statuses or attempt == MAX_ATTEMPTS:
                  break
                print(f"OpenRouter Gemini audit attempt {attempt}/{MAX_ATTEMPTS} got HTTP {e.code}; retrying in {RETRY_DELAY_SECONDS}s")
                time.sleep(RETRY_DELAY_SECONDS)
              except (urllib.error.URLError, RuntimeError) as e:
                last_error = e
                if attempt == MAX_ATTEMPTS:
                  break
                print(f"OpenRouter Gemini audit attempt {attempt}/{MAX_ATTEMPTS} failed; retrying in {RETRY_DELAY_SECONDS}s: {e}")
                time.sleep(RETRY_DELAY_SECONDS)
            raise RuntimeError(f"OpenRouter Gemini audit unavailable after {MAX_ATTEMPTS} attempt(s): {last_error}") from last_error

          def fetch_gemini_audit() -> dict:
            try:
              return fetch_direct_gemini_audit()
            except Exception as direct_error:
              print(f"Direct Gemini audit unavailable: {direct_error}; falling back to OpenRouter {OPENROUTER_MODEL}")
              try:
                return fetch_openrouter_gemini_audit()
              except Exception as fallback_error:
                raise RuntimeError(
                  "Gemini audit unavailable after direct and OpenRouter fallback: "
                  f"direct={direct_error}; fallback={fallback_error}"
                ) from fallback_error

          try:
            data = fetch_gemini_audit()
          except Exception as e:
            now = datetime.datetime.utcnow().strftime("%Y-%m-%d %H:%M UTC")
            error_message = f"Gemini audit unavailable after {MAX_ATTEMPTS} attempt(s): {e}"
            print(f"::error title=DealerScope Gemini audit degraded::{error_message}")
            summary_path = os.environ.get("GITHUB_STEP_SUMMARY")
            if summary_path:
              with open(summary_path, "a", encoding="utf-8") as summary:
                summary.write("## DealerScope Gemini audit degraded\n\n")
                summary.write(f"- Time: {now}\n")
                summary.write(f"- Status: {error_message}\n")
                summary.write("- Result: failing this workflow so a degraded red-team audit is not represented as green.\n")
            try:
              send_telegram_html_message(
                f"⚠️ <b>DealerScope 12hr Audit degraded — {now}</b>\n\n"
                f"{html.escape(error_message)[:3000]}"
              )
            except Exception as alert_error:
              print(f"::error title=DealerScope audit alert delivery failed::{alert_error}")
            raise SystemExit(1)

          raw_findings = data.get("candidates", [{}])[0].get("content", {}).get("parts", [{}])[0].get("text", "")
          findings = suppress_deterministically_false_findings(raw_findings)
          findings = suppress_unsupported_or_contradicted_findings(findings)

          print("=== GEMINI AUDIT FINDINGS ===")
          print(findings)

          # Send to Telegram if there's anything critical after deterministic suppression.
          if findings and ("CRITICAL" in findings or "HIGH" in findings) and BOT_TOKEN:
            now = datetime.datetime.utcnow().strftime("%Y-%m-%d %H:%M UTC")
            msg = f"🔍 <b>DealerScope 12hr Audit — {now}</b>\n\n<pre>{html.escape(findings)[:3000]}</pre>"
            try:
              send_telegram_html_message(msg)
            except Exception as alert_error:
              print(f"::error title=DealerScope audit alert delivery failed::{alert_error}")
              raise RuntimeError("DealerScope audit alert delivery failed: " + repr(alert_error)) from alert_error
          PYEOF
