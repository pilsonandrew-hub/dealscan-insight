name: DealerScope Scraper Watchdog

on:
  schedule:
    - cron: '0 */12 * * *'   # every 12 hours (matches scraper schedule)
  workflow_dispatch:

jobs:
  watchdog:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check Apify scraper health
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: "-1003672399222"
        run: |
          python3 << 'PYEOF'
          import json, urllib.request, ssl, datetime, sys, os

          APIFY_TOKEN = os.environ["APIFY_TOKEN"]
          BOT_TOKEN = os.environ["BOT_TOKEN"]
          CHAT_ID = os.environ["CHAT_ID"]

          # All active actors — ds-hibid intentionally disabled, excluded from monitoring
          ACTORS = {
              "ds-govdeals":       "CuKaIAcWyFS0EPrAz",
              "ds-publicsurplus":  "9xxQLlRsROnSgA42i",
              "ds-municibid":      "svmsItf3CRBZuIntp",
              "ds-gsaauctions":    "fvDnYmGuFBCrwpEi9",
              "ds-allsurplus":     "gYGIfHeYeN3EzmLnB",
              "ds-govplanet":      "pO2t5UDoSVmO1gvKJ",
              "ds-proxibid":       "bxhncvtHEP712WX2e",
              "ds-usgovbid":       "6XO9La81aEmtsCT3g",
              "ds-jjkane":         "lvb7T6VMFfNUQpqlq",
          }

          ctx = ssl.create_default_context()
          now = datetime.datetime.now(datetime.timezone.utc)
          cutoff = now - datetime.timedelta(hours=15)  # 12hr schedule + 3hr buffer
          stalled = []

          for name, actor_id in ACTORS.items():
              # Query most recent run (any status), sorted desc by creation time
              url = f"https://api.apify.com/v2/acts/{actor_id}/runs?limit=1&desc=1&token={APIFY_TOKEN}"
              req = urllib.request.Request(url)
              try:
                  with urllib.request.urlopen(req, context=ctx, timeout=15) as r:
                      data = json.loads(r.read())
                  runs = data.get("data", {}).get("items", [])
                  if not runs:
                      stalled.append(f"<b>{name}</b>: no runs found")
                      continue

                  run = runs[0]
                  status = run.get("status", "UNKNOWN")
                  started_at = run.get("startedAt", "")

                  if not started_at:
                      stalled.append(f"<b>{name}</b>: no startedAt in latest run (status={status})")
                      continue

                  run_time = datetime.datetime.fromisoformat(started_at.replace("Z", "+00:00"))

                  if status == "ABORTED":
                      # Aborted — auto-retrigger silently, only alert if it keeps happening
                      retrigger_url = f"https://api.apify.com/v2/acts/{actor_id}/runs?token={APIFY_TOKEN}"
                      retrigger_req = urllib.request.Request(retrigger_url, data=b'{}', method='POST',
                          headers={'Content-Type': 'application/json'})
                      try:
                          with urllib.request.urlopen(retrigger_req, context=ctx) as rr:
                              pass  # silently retrigger
                      except Exception:
                          stalled.append(f"<b>{name}</b>: ABORTED and retrigger failed")
                  elif status != "SUCCEEDED":
                      # Other failure — alert
                      stalled.append(f"<b>{name}</b>: last run status={status} at {started_at[:16]}Z")
                  elif run_time < cutoff:
                      # Succeeded but too long ago
                      hours_ago = round((now - run_time).total_seconds() / 3600, 1)
                      stalled.append(f"<b>{name}</b>: last success {hours_ago}h ago ({started_at[:16]}Z)")

              except Exception as e:
                  stalled.append(f"<b>{name}</b>: error checking — {e}")

          if stalled:
              def send_telegram(text):
                  payload = json.dumps({"chat_id": CHAT_ID, "text": text, "parse_mode": "HTML"}).encode()
                  req = urllib.request.Request(
                      f"https://api.telegram.org/bot{BOT_TOKEN}/sendMessage",
                      data=payload, headers={"Content-Type": "application/json"}, method="POST"
                  )
                  with urllib.request.urlopen(req, context=ctx) as r:
                      return json.loads(r.read())

              msg = "⚠️ <b>DealerScope Scraper Alert</b>\n\n" + "\n".join(stalled)
              send_telegram(msg)
              print("Stall detected, alert sent:\n" + "\n".join(stalled))
              sys.exit(1)
          else:
              print("All scrapers healthy")
          PYEOF
