name: Deal Expiry Sweeper

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deal-expiry-sweeper:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Set Git default branch for quiet checkout
        run: git config --global init.defaultBranch main

      - uses: actions/checkout@v6

      - name: Install supabase client and sweep expired deals
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: "-1003672399222"
        run: |
          python3 -m pip install --disable-pip-version-check --no-cache-dir supabase==2.30.0
          python3 scripts/deal_expiry_sweeper.py
