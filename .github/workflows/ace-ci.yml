name: ACE CI

on:
  push:
    paths:
      - "ace/**"
      - ".github/workflows/ace-ci.yml"
  pull_request:
    paths:
      - "ace/**"
      - ".github/workflows/ace-ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install coverage tooling
        run: python -m pip install coverage

      - name: Install launchd script shell
        run: sudo apt-get update && sudo apt-get install -y zsh

      - name: Run ACE tests with coverage
        run: coverage run -m unittest discover -s ace/tests -t .

      - name: Report ACE coverage (informational only)
        run: coverage report -m
