name: DealerScope Supabase Live Inspection

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: "Optional Apify run id for sanitized run-level ingest inspection"
        required: false
        default: ""

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  read-only-live-inspection:
    runs-on: ubuntu-latest
    steps:
      - name: Set Git default branch for quiet checkout
        run: git config --global init.defaultBranch main

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Run read-only Supabase aggregate inspection
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          RUN_ID: ${{ inputs.run_id }}
        run: |
          if [ -n "${RUN_ID}" ]; then
            python3 scripts/supabase_live_inspection.py --run-id "${RUN_ID}"
          else
            python3 scripts/supabase_live_inspection.py
          fi
